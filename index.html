<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealSuite — Client Proposal & Invoice Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ============================================================
       CSS RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Inter', 'Manrope', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }
    ul, ol { list-style: none; }
    img { max-width: 100%; display: block; }
    table { border-collapse: collapse; width: 100%; }

    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --bg:               #F4F7FA;
      --bg-alt:           #EEF2F5;
      --surface:          #FFFFFF;
      --border:           #E5E7EB;
      --border-light:     #F3F4F6;

      --primary:          #5347CE;
      --primary-light:    #EEF0FF;
      --primary-hover:    #4338CA;
      --lavender:         #887CFD;
      --blue:             #4896FE;
      --blue-light:       #EBF4FF;
      --teal:             #16C8C7;
      --teal-light:       #E6FAF9;

      --text-primary:     #111827;
      --text-secondary:   #6B7280;
      --text-muted:       #9CA3AF;

      --success-bg:       #E6FAF9;
      --success-text:     #0F9E9D;
      --warning-bg:       #FFF8E6;
      --warning-text:     #D97706;
      --danger-bg:        #FEF2F2;
      --danger-text:      #DC2626;
      --info-bg:          #EBF4FF;
      --info-text:        #2563EB;
      --purple-bg:        #EEF0FF;
      --purple-text:      #5347CE;
      --orange-bg:        #FFF3ED;
      --orange-text:      #EA580C;

      --radius-sm:        8px;
      --radius:           12px;
      --radius-lg:        16px;
      --radius-xl:        20px;
      --radius-full:      9999px;

      --shadow-sm:        0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow:           0 4px 12px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:        0 8px 30px rgba(0,0,0,.09), 0 4px 8px rgba(0,0,0,.05);
      --shadow-modal:     0 20px 60px rgba(0,0,0,.14), 0 8px 20px rgba(0,0,0,.08);

      --sidebar-w:        260px;
      --sidebar-collapsed: 68px;
      --header-h:         60px;
      --transition:       .2s ease;
      --transition-med:   .3s ease;
    }

    /* ============================================================
       TYPOGRAPHY UTILITIES
    ============================================================ */
    .text-xs   { font-size: 11px; line-height: 1.5; }
    .text-sm   { font-size: 12px; line-height: 1.5; }
    .text-base { font-size: 13px; line-height: 1.6; }
    .text-md   { font-size: 14px; line-height: 1.6; }
    .text-lg   { font-size: 16px; line-height: 1.4; }
    .text-xl   { font-size: 18px; line-height: 1.35; }
    .text-2xl  { font-size: 22px; line-height: 1.3; }
    .text-3xl  { font-size: 28px; line-height: 1.2; }

    .fw-400 { font-weight: 400; }
    .fw-500 { font-weight: 500; }
    .fw-600 { font-weight: 600; }
    .fw-700 { font-weight: 700; }

    .text-primary   { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    .text-muted     { color: var(--text-muted); }
    .text-purple    { color: var(--primary); }
    .text-teal      { color: var(--teal); }

    /* ============================================================
       LAYOUT UTILITIES
    ============================================================ */
    .flex        { display: flex; }
    .flex-col    { flex-direction: column; }
    .items-center{ align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center  { justify-content: center; }
    .justify-end     { justify-content: flex-end; }
    .gap-1  { gap: 4px; }
    .gap-2  { gap: 8px; }
    .gap-3  { gap: 12px; }
    .gap-4  { gap: 16px; }
    .gap-5  { gap: 20px; }
    .gap-6  { gap: 24px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }
    .min-w-0 { min-width: 0; }
    .w-full { width: 100%; }
    .h-full { height: 100%; }
    .overflow-hidden { overflow: hidden; }
    .overflow-auto   { overflow: auto; }

    /* ============================================================
       SPACING UTILITIES
    ============================================================ */
    .p-1  { padding: 4px; }
    .p-2  { padding: 8px; }
    .p-3  { padding: 12px; }
    .p-4  { padding: 16px; }
    .p-5  { padding: 20px; }
    .p-6  { padding: 24px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .px-5 { padding-left: 20px; padding-right: 20px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .ml-auto { margin-left: auto; }
    .mr-auto { margin-right: auto; }

    /* ============================================================
       BADGE / STATUS PILLS
    ============================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .badge-success  { background: var(--success-bg); color: var(--success-text); }
    .badge-danger   { background: var(--danger-bg);  color: var(--danger-text); }
    .badge-warning  { background: var(--warning-bg); color: var(--warning-text); }
    .badge-info     { background: var(--info-bg);    color: var(--info-text); }
    .badge-purple   { background: var(--purple-bg);  color: var(--purple-text); }
    .badge-orange   { background: var(--orange-bg);  color: var(--orange-text); }
    .badge-muted    { background: var(--bg-alt);     color: var(--text-secondary); }

    /* Status-specific */
    .status-draft    { background: var(--bg-alt); color: var(--text-secondary); }
    .status-sent     { background: var(--info-bg); color: var(--info-text); }
    .status-viewed   { background: var(--purple-bg); color: var(--purple-text); }
    .status-accepted { background: var(--success-bg); color: var(--success-text); }
    .status-declined { background: var(--danger-bg); color: var(--danger-text); }
    .status-expired  { background: var(--warning-bg); color: var(--warning-text); }
    .status-signed   { background: var(--success-bg); color: var(--success-text); }
    .status-paid     { background: var(--success-bg); color: var(--success-text); }
    .status-overdue  { background: var(--danger-bg); color: var(--danger-text); }
    .status-cancelled{ background: var(--bg-alt); color: var(--text-muted); }
    .status-active   { background: var(--success-bg); color: var(--success-text); }
    .status-inactive { background: var(--bg-alt); color: var(--text-secondary); }
    .status-scheduled{ background: var(--blue-light); color: var(--blue); }

    /* Trend badges */
    .trend-up   { background: var(--success-bg); color: var(--success-text); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-full); }
    .trend-down { background: var(--danger-bg);  color: var(--danger-text);  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-full); }

    /* ============================================================
       CARDS
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .card-body { padding: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--bg); color: var(--text-primary); border-color: var(--text-muted); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text-primary); }
    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: transparent;
    }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: var(--radius-sm); }
    .btn-lg { padding: 11px 22px; font-size: 14px; }
    .btn-icon { padding: 7px; border-radius: var(--radius-sm); }
    .btn-icon.btn-sm { padding: 5px; }

    /* ============================================================
       FORM CONTROLS
    ============================================================ */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .form-control {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--surface);
      transition: border-color var(--transition);
      outline: none;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-error { font-size: 11px; color: var(--danger-text); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Search input */
    .search-wrap {
      position: relative;
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      padding-left: 34px;
    }

    /* ============================================================
       TABLES
    ============================================================ */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table { width: 100%; font-size: 13px; }
    .data-table thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      white-space: nowrap;
    }
    .data-table tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background var(--transition);
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--bg); }
    .data-table tbody td {
      padding: 13px 16px;
      color: var(--text-primary);
      vertical-align: middle;
    }
    .data-table .td-actions { display: flex; gap: 4px; align-items: center; }

    /* ============================================================
       AVATAR
    ============================================================ */
    .avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .avatar-sm  { width: 28px; height: 28px; font-size: 11px; }
    .avatar-md  { width: 36px; height: 36px; font-size: 13px; }
    .avatar-lg  { width: 44px; height: 44px; font-size: 16px; }
    .avatar-xl  { width: 56px; height: 56px; font-size: 20px; }

    /* Avatar colors by index */
    .av-0  { background: linear-gradient(135deg,#5347CE,#887CFD); }
    .av-1  { background: linear-gradient(135deg,#16C8C7,#4896FE); }
    .av-2  { background: linear-gradient(135deg,#F59E0B,#EF4444); }
    .av-3  { background: linear-gradient(135deg,#10B981,#3B82F6); }
    .av-4  { background: linear-gradient(135deg,#EC4899,#A855F7); }
    .av-5  { background: linear-gradient(135deg,#14B8A6,#6366F1); }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .divider { height: 1px; background: var(--border); }
    .divider-v { width: 1px; background: var(--border); align-self: stretch; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      gap: 12px;
    }
    .empty-icon {
      width: 56px; height: 56px;
      background: var(--bg-alt);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    /* ============================================================
       PAGE TRANSITIONS
    ============================================================ */
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardStagger {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-view { display: none; animation: pageFadeIn var(--transition-med) forwards; }
    .page-view.active { display: block; }
    .stagger-item { opacity: 0; animation: cardStagger .4s ease forwards; }

    /* ============================================================
       ICON BOX
    ============================================================ */
    .icon-box {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .icon-box-sm  { width: 28px; height: 28px; }
    .icon-box-md  { width: 36px; height: 36px; }
    .icon-box-lg  { width: 44px; height: 44px; }
    .icon-box-purple { background: var(--primary-light); color: var(--primary); }
    .icon-box-teal   { background: var(--teal-light); color: var(--teal); }
    .icon-box-blue   { background: var(--blue-light); color: var(--blue); }
    .icon-box-orange { background: var(--orange-bg); color: var(--orange-text); }
    .icon-box-danger { background: var(--danger-bg); color: var(--danger-text); }
    .icon-box-muted  { background: var(--bg-alt); color: var(--text-secondary); }

    /* ============================================================
       TABS
    ============================================================ */
    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ============================================================
       FILTER CHIPS
    ============================================================ */
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all var(--transition);
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ============================================================
       DROPDOWN MENU
    ============================================================ */
    .dropdown { position: relative; display: inline-flex; }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      display: none;
      overflow: hidden;
      animation: dropdownIn .15s ease;
    }
    .dropdown-menu.open { display: block; }
    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition);
    }
    .dropdown-item:hover { background: var(--bg); }
    .dropdown-item.danger { color: var(--danger-text); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ============================================================
       TOAST NOTIFICATIONS
    ============================================================ */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      min-width: 280px;
      max-width: 360px;
      animation: toastIn .3s ease;
    }
    .toast.leaving { animation: toastOut .3s ease forwards; }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
    .toast-success { border-left: 3px solid var(--teal); }
    .toast-error   { border-left: 3px solid var(--danger-text); }
    .toast-info    { border-left: 3px solid var(--primary); }
    .toast-icon    { flex-shrink: 0; }

    /* ============================================================
       MODAL
    ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; animation: overlayIn .2s ease; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-modal);
      width: 100%;
      max-width: 520px;
      animation: modalIn .25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-lg { max-width: 720px; }
    @keyframes modalIn { from { opacity: 0; transform: scale(.94) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ============================================================
       PROGRESS BAR
    ============================================================ */
    .progress-bar {
      height: 6px;
      background: var(--bg-alt);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--primary);
      transition: width .6s ease;
    }

    /* ============================================================
       MISCELLANEOUS
    ============================================================ */
    .cursor-pointer { cursor: pointer; }
    .select-none { user-select: none; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rounded-full { border-radius: var(--radius-full); }
    .border { border: 1px solid var(--border); }
    .border-top { border-top: 1px solid var(--border); }
    .border-bottom { border-bottom: 1px solid var(--border); }
    .bg-surface { background: var(--surface); }
    .bg-bg { background: var(--bg); }
    .shadow { box-shadow: var(--shadow); }
    .shadow-sm { box-shadow: var(--shadow-sm); }
  </style>
</head>
<body>

<!-- ================================================================
     APP SHELL
================================================================ -->
<div id="app" class="flex h-full">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <!-- content injected by JS -->
  </aside>

  <!-- MAIN AREA -->
  <div id="main-wrap" class="main-wrap flex-col flex-1">

    <!-- HEADER -->
    <header id="app-header" class="app-header">
      <!-- content injected by JS -->
    </header>

    <!-- PAGE CONTAINER -->
    <main id="page-container" class="page-container">
      <!-- All page views will be rendered here -->
    </main>

  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODAL OVERLAY -->

function fmtCurrency(n, cur='USD'){

function fmtDate(d){ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function relTime(str){
  const d = new Date(str), now = new Date();
  const diff = Math.floor((now-d)/1000);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60)+'m ago';
  if(diff < 86400) return Math.floor(diff/3600)+'h ago';
  if(diff < 604800) return Math.floor(diff/86400)+'d ago';
  return fmtDate(str);
}

    el.classList.toggle('active', el.id === 'page-'+page);
  });
  // Render dynamic pages
  renderPage(page, params);
  // Close mobile sidebar
  closeMobileSidebar();
  // Scroll top
  document.getElementById('page-container').scrollTop = 0;
}

function renderPage(page, params){
  switch(page){
    case 'dashboard':   renderDashboard(); break;
    case 'clients':     renderClientsList(); break;
    case 'client-detail': renderClientDetail(params.clientId||currentClientId); break;
    case 'proposals':   renderProposalsList(); break;
    case 'proposal-builder': renderProposalBuilder(params.proposalId); break;
    case 'contracts':   renderContractsList(); break;
    case 'contract-builder': renderContractBuilder(params.contractId); break;
    case 'invoices':    renderInvoicesList(); break;
    case 'invoice-builder': renderInvoiceBuilder(params.invoiceId); break;
    case 'payments':    renderPayments(); break;
    case 'templates':   renderTemplates(); break;
    case 'activity':    renderActivity(); break;

}

// ================================================================

// ================================================================
function showToast(msg, type='success', duration=3000){
  const icons = { success:'check-circle', error:'x-circle', info:'info' };
  const colors = { success:'var(--teal)', error:'var(--danger-text)', info:'var(--primary)' };
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `
    <span class="toast-icon" style="color:${colors[type]}">
      <i data-lucide="${icons[type]}" style="width:16px;height:16px;"></i>
    </span>
    <span style="flex:1;font-size:13px;">${msg}</span>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0 0 0 8px;">
      <i data-lucide="x" style="width:14px;height:14px;"></i>
    </button>
  `;
  c.appendChild(t);
  lucide.createIcons();
  setTimeout(()=>{ t.classList.add('leaving'); setTimeout(()=>t.remove(), 300); }, duration);
}

function openModal(html, large=false){
  const box = document.getElementById('modal-box');
  box.className = 'modal' + (large?' modal-lg':'');
  box.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
  lucide.createIcons();
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalOnOverlay(e){
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}

let confirmCallback = null;
function openConfirm(title, message, onOk, btnLabel='Delete'){
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-ok-btn').textContent = btnLabel;
  confirmCallback = onOk;
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok-btn').onclick = ()=>{ closeConfirm(); onOk(); };
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('open'); confirmCallback=null; }
function closeConfirmOnOverlay(e){ if(e.target===document.getElementById('confirm-overlay')) closeConfirm(); }

// ================================================================
// DROPDOWN UTILS
// ================================================================
function toggleCreateMenu(){ document.getElementById('create-menu').classList.toggle('open'); }
function closeDropdowns(){ document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open')); }
document.addEventListener('click', e=>{
  if(!e.target.closest('.dropdown')) closeDropdowns();
  if(!e.target.closest('.action-menu-wrap')) document.querySelectorAll('.action-menu').forEach(m=>m.classList.remove('open'));
});

function toggleActionMenu(id){
  const menu = document.getElementById('action-'+id);
  document.querySelectorAll('.action-menu').forEach(m=>{ if(m.id!=='action-'+id) m.classList.remove('open'); });
  if(menu) menu.classList.toggle('open');
}

// ================================================================
// COUNT UP ANIMATION
// ================================================================
function countUp(el, target, duration=800, prefix='', suffix=''){
  const start = 0;
  const step = (timestamp, startTime) => {
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = prefix + Math.floor(eased * target).toLocaleString() + suffix;
    if(progress < 1) requestAnimationFrame(ts => step(ts, startTime));
  };
  requestAnimationFrame(ts => step(ts, ts));
}

// Stagger animation
function applyStagger(container, selector='.stagger-item', baseDelay=0, step=80){
  container.querySelectorAll(selector).forEach((el,i)=>{
    el.style.animationDelay = (baseDelay + i*step)+'ms';
  });
}

            }).join('')}

        </table>

    </div>
  `;

    const prefix = el.dataset.prefix || '';
    const isCur = el.dataset.currency === 'true';
    if(isCur){
      countUpCurrency(el, target);
    } else {
      countUp(el, target, 800, prefix);
    }
  });
}

function countUpCurrency(el, target, dur=900){
  const start = performance.now();
  const tick = now => {
    const p = Math.min((now-start)/dur, 1);
    const ease = 1-Math.pow(1-p,3);
    el.textContent = '$' + (ease*target).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    if(p<1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function buildRevenueChart(){
  const months = ['Jul','Aug','Sep','Oct','Nov','Dec'];
  const values = [3200,4800,3900,6200,5100,7400];
  const max = Math.max(...values);
  const bars = months.map((m,i)=>{
    const h = Math.round((values[i]/max)*140);
    const isLast = i===months.length-1;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
        ${isLast?`<div style="font-size:11px;font-weight:600;color:var(--primary);">$${(values[i]/1000).toFixed(1)}k</div>`:'<div style="height:16px;"></div>'}
        <div style="width:100%;display:flex;align-items:flex-end;justify-content:center;">
          <div style="width:28px;height:${h}px;background:${isLast?'linear-gradient(180deg,var(--primary),var(--lavender))':'var(--bg-alt)'};border-radius:6px 6px 3px 3px;transition:height .6s ease;"></div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);">${m}</div>
      </div>`;
  });
  return `
    <div style="display:flex;align-items:flex-end;gap:8px;height:180px;padding-bottom:4px;">
      <div style="display:flex;flex-direction:column;justify-content:space-between;height:156px;padding-bottom:0;margin-right:4px;">
        ${['$8k','$6k','$4k','$2k','$0'].map(l=>`<div style="font-size:10px;color:var(--text-muted);text-align:right;">${l}</div>`).join('')}
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;flex:1;height:156px;">
        ${bars.join('')}
      </div>
    </div>
    <div class="flex justify-between mt-3" style="padding-left:36px;">
      <div style="font-size:13px;font-weight:600;">Total: <span style="color:var(--primary);">$30,600</span></div>
      <span class="trend-up">↗ 18.4% vs last period</span>
    </div>`;
}

function buildTimelineItem(a){
  const cl = getClient(a.clientId);
  const typeColors = {
    proposal:'icon-box-purple', contract:'icon-box-teal',
    invoice:'icon-box-blue', payment:'icon-box-orange',
    client:'icon-box-muted'
  };
  return `
    <div class="timeline-item">
      <div class="timeline-dot ${typeColors[a.type]||'icon-box-muted'}" style="width:30px;height:30px;">
        <i data-lucide="${a.icon}" style="width:13px;height:13px;"></i>
      </div>
      <div class="timeline-content">
        <div class="timeline-text"><strong>${cl.name||''}</strong> — ${a.subject}</div>
        <div class="timeline-time">${relTime(a.time)} · ${a.type}</div>
      </div>
    </div>`;
}

function statusClass(s){
  const map = {
    draft:'status-draft', sent:'status-sent', viewed:'status-viewed',
    accepted:'status-accepted', declined:'status-declined', expired:'status-expired',
    signed:'status-signed', paid:'status-paid', overdue:'status-overdue',
    cancelled:'status-cancelled', active:'status-active', inactive:'status-inactive',
    scheduled:'status-scheduled', partial:'status-warning'
  };
  return 'badge ' + (map[s]||'badge-muted');
}

function switchTab(btn, tabId, group){
  const parent = btn.closest('.page-view')||document.getElementById('page-container');
  parent.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // derive prefix from first tab's id pattern
  const panels = parent.querySelectorAll('.tab-panel');
  panels.forEach(p=>p.classList.remove('active'));
  const target = parent.querySelector(`[id$="-${tabId}"]`);
  if(target) target.classList.add('active');
}

            <option value="active" ${!c||c.status==='active'?'selected':''}>Active</option>
            <option value="inactive" ${c&&c.status==='inactive'?'selected':''}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="cl-notes" rows="2" placeholder="Internal notes about this client…">${c?c.notes:''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient('${editId||''}')"><i data-lucide="check" style="width:14px;height:14px;"></i> ${c?'Save Changes':'Add Client'}</button>
    </div>
  `);
}

function openEditClientModal(id){ openAddClientModal(id); }

function saveClient(editId){
  const name    = document.getElementById('cl-name').value.trim();
  const company = document.getElementById('cl-company').value.trim();
  const email   = document.getElementById('cl-email').value.trim();
  if(!name||!email){ showToast('Name and email are required','error'); return; }
  if(editId){
    const c = db.clients.find(cl=>cl.id===editId);
    Object.assign(c,{ name, company, email,
      phone:   document.getElementById('cl-phone').value.trim(),
      address: document.getElementById('cl-address').value.trim(),
      taxId:   document.getElementById('cl-tax').value.trim(),
      status:  document.getElementById('cl-status').value,
      notes:   document.getElementById('cl-notes').value.trim(),
    });
    showToast('Client updated successfully','success');
  } else {
    db.clients.push({ id:'c'+Date.now(), name, company, email,
      phone:    document.getElementById('cl-phone').value.trim(),
      address:  document.getElementById('cl-address').value.trim(),
      taxId:    document.getElementById('cl-tax').value.trim(),
      status:   document.getElementById('cl-status').value,
      notes:    document.getElementById('cl-notes').value.trim(),
      colorIdx: db.clients.length, projects:[]
    });
    showToast('Client added successfully','success');
  }
  closeModal();
  renderClientsList();
}

function deleteClient(id){
  openConfirm('Delete Client','Are you sure you want to delete this client? This action cannot be undone.',()=>{
    db.clients = db.clients.filter(c=>c.id!==id);
    showToast('Client deleted','success');
    renderClientsList();
  });
}
</script>

================================================================ -->
<script>
let proposalFilter = 'all';
let proposalSearch = '';

function renderProposalsList(){
  let list = db.proposals;
  if(proposalFilter!=='all') list=list.filter(p=>p.status===proposalFilter);
  if(proposalSearch) list=list.filter(p=>(p.title+(getClient(p.clientId).name||'')).toLowerCase().includes(proposalSearch.toLowerCase()));

  document.getElementById('page-proposals').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Proposals</div><div class="page-subtitle">${db.proposals.length} total proposals</div></div>
      <button class="btn btn-primary" onclick="navigateTo('proposal-builder',{proposalId:'new'})">
        <i data-lucide="file-plus" style="width:14px;height:14px;"></i> New Proposal
      </button>
    </div>
    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:12px;">
        <div class="filter-chips">
          ${['all','draft','sent','viewed','accepted','declined'].map(f=>`
            <div class="chip ${proposalFilter===f?'active':''}" onclick="proposalFilter='${f}';renderProposalsList()">
              ${f.charAt(0).toUpperCase()+f.slice(1)}
            </div>`).join('')}
        </div>
        <div class="search-wrap" style="width:220px;">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i>
          <input class="form-control" placeholder="Search proposals…" oninput="proposalSearch=this.value;renderProposalsList()" value="${proposalSearch}">
        </div>
      </div>
      <div class="table-wrap">
        ${list.length===0?`<div class="empty-state"><div class="empty-icon"><i data-lucide="file-text" style="width:24px;height:24px;"></i></div><div class="text-md fw-500">No proposals found</div><button class="btn btn-primary mt-3" onclick="navigateTo('proposal-builder',{proposalId:'new'})">Create Proposal</button></div>`:`
        <table class="data-table">
          <thead><tr><th>Title</th><th>Client</th><th>Amount</th><th>Status</th><th>Created</th><th>Expires</th><th>Actions</th></tr></thead>
          <tbody>${list.map(p=>{
            const cl=getClient(p.clientId);
            return `<tr style="cursor:pointer;" onclick="navigateTo('proposal-builder',{proposalId:'${p.id}'})">
              <td style="font-weight:500;">${p.title}</td>
              <td><div class="flex items-center gap-2"><div class="avatar avatar-sm ${avColor(cl.colorIdx||0)}">${initials(cl.name||'?')}</div><div><div style="font-size:13px;">${cl.name||'—'}</div><div style="font-size:11px;color:var(--text-muted);">${cl.company||''}</div></div></div></td>
              <td style="font-weight:600;">${fmtCurrency(p.amount,p.currency)}</td>
              <td><span class="badge ${statusClass(p.status)}">${p.status}</span></td>
              <td style="color:var(--text-secondary);">${fmtDate(p.created)}</td>
              <td style="color:var(--text-secondary);">${fmtDate(p.expires)}</td>
              <td onclick="event.stopPropagation()"><div class="td-actions">
                <button class="btn btn-sm btn-secondary" onclick="navigateTo('proposal-builder',{proposalId:'${p.id}'})">Open</button>
                <button class="btn btn-sm btn-ghost" onclick="sendProposal('${p.id}')"><i data-lucide="send" style="width:13px;height:13px;"></i></button>
                <button class="btn btn-sm btn-ghost" style="color:var(--danger-text)" onclick="deleteProposal('${p.id}')"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>
              </div></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`}
      </div>
    </div>`;
  lucide.createIcons();
}

// Proposal state for builder
let activeProposal = null;
let activePropSection = 0;
let feeMode = 'single';
let lineItems = [
  {desc:'Web Design', qty:1, rate:3500, tax:9},
  {desc:'Development', qty:1, rate:4000, tax:9},
  {desc:'SEO Setup', qty:1, rate:1000, tax:9},
];

function renderProposalBuilder(propId){
  if(propId && propId !== 'new'){
    activeProposal = db.proposals.find(p=>p.id===propId) || null;
  } else {
    activeProposal = { id:'new', title:'Untitled Proposal', clientId:'', status:'draft', amount:0, currency:'USD', sections:['Cover Page','Introduction','Scope of Work','Deliverables','Timeline','Fee Summary','Terms & Conditions'], created: new Date().toISOString().split('T')[0], expires:'' };
  }
  const p = activeProposal;
  const cl = getClient(p.clientId);

  document.getElementById('page-proposal-builder').innerHTML = `
    <!-- Builder Top Bar -->
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <button class="btn btn-ghost btn-sm" onclick="navigateTo('proposals')"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i></button>
        <input id="prop-title" class="form-control" style="width:280px;font-weight:600;" value="${p.title}" oninput="p.title=this.value;updatePropPreview()">
        <span class="badge ${statusClass(p.status)}">${p.status}</span>
        <span style="font-size:11px;color:var(--text-muted);">Auto-saved</span>
      </div>
      <div class="flex gap-2">
        <select class="form-control" style="width:160px;" onchange="p.clientId=this.value;updatePropPreview()">
          <option value="">Select client…</option>
          ${db.clients.map(c=>`<option value="${c.id}" ${p.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Draft saved','success')"><i data-lucide="save" style="width:13px;height:13px;"></i> Save Draft</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Preview opened','info')"><i data-lucide="eye" style="width:13px;height:13px;"></i> Preview</button>
        <button class="btn btn-primary btn-sm" onclick="sendProposal(p.id)"><i data-lucide="send" style="width:13px;height:13px;"></i> Send</button>
      </div>
    </div>

    <div class="builder-wrap">
      <!-- Left: Section Editor -->
      <div class="builder-panel">
        <div style="padding:14px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Sections</span>
          <button class="btn btn-sm btn-secondary" onclick="addPropSection()"><i data-lucide="plus" style="width:12px;height:12px;"></i> Add</button>
        </div>
        <div class="section-list" id="section-list">
          ${p.sections.map((s,i)=>`
            <div class="section-item ${i===activePropSection?'active':''}" onclick="activePropSection=${i};renderProposalBuilder(p.id)" draggable="true">
              <i data-lucide="grip-vertical" class="drag-handle" style="width:13px;height:13px;"></i>
              <span style="flex:1;">${s}</span>
              <button class="btn btn-icon btn-ghost" style="padding:2px;" onclick="event.stopPropagation();removePropSection(${i})"><i data-lucide="x" style="width:11px;height:11px;"></i></button>
            </div>`).join('')}
        </div>
        <!-- Section Content Editor -->
        <div style="padding:14px;border-top:1px solid var(--border);">
          ${buildSectionEditor(p.sections[activePropSection], p)}
        </div>
      </div>

      <!-- Right: Live Preview -->
      <div class="builder-preview">
        <div class="preview-doc" id="prop-preview">
          ${buildProposalPreview(p)}
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

function buildSectionEditor(section, p){
  if(!section) return '';
  if(section === 'Fee Summary') return buildFeeSummaryEditor();
  if(section === 'Cover Page') return `
    <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">COVER PAGE</div>
    <div class="form-group mb-3"><label class="form-label">Proposal Title</label><input class="form-control" value="${p.title}" oninput="document.getElementById('prop-title').value=this.value;p.title=this.value;updatePropPreview()"></div>
    <div class="form-group mb-3"><label class="form-label">Tagline</label><input class="form-control" placeholder="e.g. Transforming your digital presence" oninput="updatePropPreview()"></div>
    <div class="form-group"><label class="form-label">Valid Until</label><input class="form-control" type="date" value="${p.expires}" oninput="p.expires=this.value;updatePropPreview()"></div>`;
  return `
    <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">${section.toUpperCase()}</div>
    <div class="form-group"><label class="form-label">Content</label>
    <textarea class="form-control" rows="8" placeholder="Write the ${section} content here…" oninput="updatePropPreview()">
${getSectionDefault(section)}</textarea></div>`;
}

function getSectionDefault(s){
  const defs = {
    'Introduction': 'Thank you for the opportunity to present this proposal. We are excited to partner with you on this project.',
    'Scope of Work': '• Website design and development\n• Brand identity refinement\n• Content strategy\n• SEO optimization',
    'Deliverables': '• Final design files (Figma)\n• Responsive website (3 pages)\n• Style guide\n• 30-day post-launch support',
    'Timeline': 'Week 1–2: Discovery & strategy\nWeek 3–4: Design concepts\nWeek 5–6: Development\nWeek 7: Testing & launch',
    'Terms & Conditions': '50% deposit required to begin work. Remaining balance due upon project completion. All work remains property of client upon final payment.',
  };
  return defs[s] || '';
}

function buildFeeSummaryEditor(){
  const subtotal = lineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const taxAmt   = lineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const total    = subtotal + taxAmt;

  return `
    <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">FEE SUMMARY</div>
    <!-- Mode selector -->
    <div class="flex gap-1 mb-3" style="background:var(--bg);border-radius:var(--radius-sm);padding:3px;">
      ${['single','packages','multi-select'].map(m=>`
        <button onclick="feeMode='${m}';renderProposalBuilder(activeProposal?activeProposal.id:'new')"
          style="flex:1;padding:5px 8px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;
          background:${feeMode===m?'var(--surface)':'transparent'};
          color:${feeMode===m?'var(--primary)':'var(--text-secondary)'};
          box-shadow:${feeMode===m?'var(--shadow-sm)':'none'};transition:all .15s;">
          ${m.charAt(0).toUpperCase()+m.slice(1)}
        </button>`).join('')}
    </div>

    ${feeMode==='packages' ? buildPackageEditor() : buildLineItemEditor(subtotal, taxAmt, total)}
  `;
}

function buildLineItemEditor(sub, tax, total){
  return `
    <div style="overflow-x:auto;">
    <table class="line-items-table" style="margin-bottom:8px;">
      <thead><tr><th style="width:40%;">Description</th><th>Qty</th><th>Rate</th><th>Tax%</th><th>Total</th><th></th></tr></thead>
      <tbody id="line-items-body">
        ${lineItems.map((li,i)=>`<tr>
          <td><input value="${li.desc}" oninput="lineItems[${i}].desc=this.value;updatePropPreview()"></td>
          <td><input type="number" value="${li.qty}" style="width:50px;" oninput="lineItems[${i}].qty=+this.value;updatePropPreview()"></td>
          <td><input type="number" value="${li.rate}" style="width:80px;" oninput="lineItems[${i}].rate=+this.value;updatePropPreview()"></td>
          <td><input type="number" value="${li.tax}" style="width:50px;" oninput="lineItems[${i}].tax=+this.value;updatePropPreview()"></td>
          <td style="font-weight:600;white-space:nowrap;">$${(li.qty*li.rate).toLocaleString()}</td>
          <td><button onclick="lineItems.splice(${i},1);renderProposalBuilder(activeProposal?activeProposal.id:'new')" style="background:none;border:none;cursor:pointer;color:var(--danger-text);"><i data-lucide="x" style="width:12px;height:12px;"></i></button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
    <button class="btn btn-sm btn-secondary mb-3" style="width:100%;" onclick="lineItems.push({desc:'',qty:1,rate:0,tax:9});renderProposalBuilder(activeProposal?activeProposal.id:'new')">+ Add Line Item</button>
    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:12px;display:flex;flex-direction:column;gap:6px;">
      <div class="flex justify-between"><span style="color:var(--text-secondary);">Subtotal</span><span>$${sub.toLocaleString()}</span></div>
      <div class="flex justify-between"><span style="color:var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
      <div class="flex justify-between fw-700" style="border-top:1px solid var(--border);padding-top:6px;font-size:14px;color:var(--primary);"><span>Total</span><span>$${total.toFixed(2)}</span></div>
    </div>`;
}

function buildPackageEditor(){
  const pkgs = [{name:'Basic',price:2500,features:'3 pages\nBasic design\n30 days support'},{name:'Standard',price:5000,recommended:true,features:'8 pages\nCustom design\nSEO setup\n60 days support'},{name:'Premium',price:9500,features:'15 pages\nPremium design\nAdvanced SEO\n90 days support\nMonthly retainer'}];
  return `<div class="package-grid" style="grid-template-columns:1fr;">
    ${pkgs.map(pk=>`
      <div class="package-card${pk.recommended?' recommended':''}">
        ${pk.recommended?`<div class="package-recommend-tag">Recommended</div>`:''}
        <div class="flex justify-between items-center mb-2">
          <div style="font-weight:700;font-size:14px;">${pk.name}</div>
          <div style="font-size:16px;font-weight:700;color:var(--primary);">$${pk.price.toLocaleString()}</div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);white-space:pre-line;">${pk.features}</div>
      </div>`).join('')}
  </div>`;
}

function buildProposalPreview(p){
  const cl = getClient(p.clientId);
  const sub = lineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax = lineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const total = sub+tax;
  return `
    <div style="background:linear-gradient(135deg,var(--primary) 0%,var(--lavender) 100%);padding:48px 40px;color:#fff;">
      <div style="font-size:11px;font-weight:600;letter-spacing:.1em;opacity:.7;margin-bottom:8px;">PROPOSAL</div>
      <div style="font-size:24px;font-weight:700;margin-bottom:12px;">${p.title}</div>
      ${cl.name?`<div style="opacity:.85;font-size:14px;">Prepared for <strong>${cl.name}</strong>${cl.company?` · ${cl.company}`:''}</div>`:''}
      ${p.expires?`<div style="margin-top:12px;font-size:12px;opacity:.7;">Valid until ${fmtDate(p.expires)}</div>`:''}
    </div>
    <div style="padding:32px 40px;">
      ${p.sections.filter(s=>s!=='Cover Page').map(s=>`
        <div style="margin-bottom:28px;">
          <div style="font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">${s}</div>
          ${s==='Fee Summary' ? `
            <table style="width:100%;font-size:13px;border-collapse:collapse;">
              <thead><tr style="background:var(--bg);">${['Description','Qty','Rate','Tax','Total'].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);">${h}</th>`).join('')}</tr></thead>
              <tbody>${lineItems.map(li=>`<tr style="border-bottom:1px solid var(--border-light);">
                <td style="padding:8px 10px;">${li.desc}</td>
                <td style="padding:8px 10px;">${li.qty}</td>
                <td style="padding:8px 10px;">$${li.rate.toLocaleString()}</td>
                <td style="padding:8px 10px;">${li.tax}%</td>
                <td style="padding:8px 10px;font-weight:600;">$${(li.qty*li.rate).toLocaleString()}</td>
              </tr>`).join('')}</tbody>
            </table>
            <div style="margin-top:14px;padding:14px;background:var(--bg);border-radius:var(--radius);font-size:13px;">
              <div class="flex justify-between" style="margin-bottom:6px;"><span style="color:var(--text-secondary);">Subtotal</span><span>$${sub.toLocaleString()}</span></div>
              <div class="flex justify-between" style="margin-bottom:6px;"><span style="color:var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
              <div class="flex justify-between" style="border-top:1px solid var(--border);padding-top:8px;font-size:15px;font-weight:700;color:var(--primary);"><span>Total</span><span>$${total.toFixed(2)}</span></div>
            </div>` :
          `<div style="font-size:13px;color:var(--text-secondary);line-height:1.8;white-space:pre-line;">${getSectionDefault(s)||'Content goes here…'}</div>`}
        </div>`).join('')}
      <div style="margin-top:32px;padding-top:20px;border-top:2px solid var(--border);display:flex;gap:12px;">
        <button class="btn btn-primary" style="flex:1;" onclick="showToast('Proposal accepted! Contract will be generated.','success')">Accept Proposal</button>
        <button class="btn btn-secondary" onclick="showToast('Proposal declined','error')">Decline</button>
      </div>
    </div>`;
}

function updatePropPreview(){
  const preview = document.getElementById('prop-preview');
  if(preview && activeProposal) preview.innerHTML = buildProposalPreview(activeProposal);
}

function addPropSection(){
  if(!activeProposal) return;
  const s = prompt('Section name:','Custom Section');
  if(s){ activeProposal.sections.push(s); renderProposalBuilder(activeProposal.id); }
}
function removePropSection(i){
  if(!activeProposal) return;
  activeProposal.sections.splice(i,1);
  if(activePropSection>=activeProposal.sections.length) activePropSection=Math.max(0,activeProposal.sections.length-1);
  renderProposalBuilder(activeProposal.id);
}

function sendProposal(id){
  const p = id==='new' ? activeProposal : db.proposals.find(pr=>pr.id===id);
  const cl = p ? getClient(p.clientId) : null;
  openModal(`
    <div class="modal-header"><span class="modal-title">Send Proposal</span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group"><label class="form-label">To</label><input class="form-control" value="${cl?cl.email:''}" placeholder="client@email.com"></div>
      <div class="form-group"><label class="form-label">Subject</label><input class="form-control" value="Proposal: ${p?p.title:''}"></div>
      <div class="form-group"><label class="form-label">Message</label><textarea class="form-control" rows="4">Hi ${cl?cl.name.split(' ')[0]:'there'},\n\nPlease find your proposal attached. Looking forward to hearing from you.\n\nBest regards,\n${db.user.name}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Valid Until</label><input class="form-control" type="date"></div>
        <div class="form-group"><label class="form-label">Options</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;margin-top:4px;"><input type="checkbox" checked> Attach PDF</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="closeModal();if(p)p.status='sent';showToast('Proposal sent successfully!','success');renderProposalsList()"><i data-lucide="send" style="width:14px;height:14px;"></i> Send Proposal</button>
    </div>`);
}

function deleteProposal(id){
  openConfirm('Delete Proposal','Are you sure? This cannot be undone.',()=>{
    db.proposals = db.proposals.filter(p=>p.id!==id);
    showToast('Proposal deleted','success');
    renderProposalsList();
  });
}
</script>

================================================================ -->
<script>
let activeContract = null;
let activeClauseIdx = 0;
const STD_CLAUSES = {
  'Scope of Work': 'The Service Provider agrees to perform the services described herein in a professional and timely manner. Any changes to the scope must be agreed upon in writing by both parties.',
  'Payment Terms': 'A deposit of 50% is due upon signing. The remaining balance is due upon project completion. Late payments incur a 1.5% monthly fee.',
  'Intellectual Property': 'Upon full payment, all intellectual property rights for the deliverables are assigned to the Client. The Service Provider retains the right to display the work in their portfolio.',
  'Confidentiality': 'Both parties agree to keep confidential all proprietary information disclosed during the project and for 2 years thereafter.',
  'Termination': 'Either party may terminate this agreement with 14 days written notice. Client is responsible for payment for all work completed up to termination date.',
  'Dispute Resolution': 'Any disputes will be resolved through binding arbitration in accordance with applicable law before pursuing litigation.',
  'Revisions': 'This agreement includes up to 3 rounds of revisions. Additional revisions will be billed at the hourly rate specified herein.',
};

function renderContractsList(){
  document.getElementById('page-contracts').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Contracts</div><div class="page-subtitle">${db.contracts.length} total contracts</div></div>
      <button class="btn btn-primary" onclick="navigateTo('contract-builder',{contractId:'new'})">
        <i data-lucide="file-plus" style="width:14px;height:14px;"></i> New Contract
      </button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Title</th><th>Client</th><th>Value</th><th>Status</th><th>Created</th><th>Expires</th><th>Actions</th></tr></thead>
          <tbody>${db.contracts.map(ct=>{
            const cl=getClient(ct.clientId);
            return `<tr style="cursor:pointer;" onclick="navigateTo('contract-builder',{contractId:'${ct.id}'})">
              <td style="font-weight:500;">${ct.title}</td>
              <td><div class="flex items-center gap-2"><div class="avatar avatar-sm ${avColor(cl.colorIdx||0)}">${initials(cl.name||'?')}</div>${cl.name||'—'}</div></td>
              <td style="font-weight:600;">${fmtCurrency(ct.value)}</td>
              <td><span class="badge ${statusClass(ct.status)}">${ct.status}</span></td>
              <td style="color:var(--text-secondary);">${fmtDate(ct.created)}</td>
              <td style="color:var(--text-secondary);">${fmtDate(ct.expires)}</td>
              <td onclick="event.stopPropagation()"><div class="td-actions">
                <button class="btn btn-sm btn-secondary" onclick="navigateTo('contract-builder',{contractId:'${ct.id}'})">Open</button>
                <button class="btn btn-sm btn-ghost" onclick="sendContract('${ct.id}')"><i data-lucide="send" style="width:13px;height:13px;"></i></button>
                <button class="btn btn-sm btn-ghost" style="color:var(--danger-text)" onclick="deleteContract('${ct.id}')"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>
              </div></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  lucide.createIcons();
}

function renderContractBuilder(ctId){
  if(ctId && ctId!=='new'){
    activeContract = db.contracts.find(c=>c.id===ctId)||null;
  } else {
    activeContract = { id:'new', title:'New Contract', clientId:'', status:'draft', value:0, created:new Date().toISOString().split('T')[0], expires:'', clauses: Object.keys(STD_CLAUSES).slice(0,4) };
  }
  const ct = activeContract;
  const cl = getClient(ct.clientId);

  document.getElementById('page-contract-builder').innerHTML = `
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <button class="btn btn-ghost btn-sm" onclick="navigateTo('contracts')"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i></button>
        <input class="form-control" style="width:280px;font-weight:600;" value="${ct.title}" oninput="ct.title=this.value">
        <span class="badge ${statusClass(ct.status)}">${ct.status}</span>
      </div>
      <div class="flex gap-2">
        <select class="form-control" style="width:160px;" onchange="ct.clientId=this.value">
          <option value="">Select client…</option>
          ${db.clients.map(c=>`<option value="${c.id}" ${ct.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Draft saved','success')"><i data-lucide="save" style="width:13px;height:13px;"></i> Save</button>
        <button class="btn btn-primary btn-sm" onclick="sendContract(ct.id)"><i data-lucide="send" style="width:13px;height:13px;"></i> Send</button>
      </div>
    </div>

    <div class="builder-wrap">
      <!-- Left: Clauses -->
      <div class="builder-panel">
        <div style="padding:14px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Clauses</span>
          <button class="btn btn-sm btn-secondary" onclick="addClause()"><i data-lucide="plus" style="width:12px;height:12px;"></i> Add</button>
        </div>
        <div class="section-list">
          ${Object.keys(STD_CLAUSES).map((c,i)=>{
            const included = ct.clauses.includes(c);
            return `<div class="section-item ${included && ct.clauses.indexOf(c)===activeClauseIdx?'active':''} ${!included?'':''}">
              <input type="checkbox" ${included?'checked':''} onclick="toggleClause('${c}',this.checked)" style="flex-shrink:0;">
              <span style="flex:1;color:${included?'inherit':'var(--text-muted)'};" onclick="activeClauseIdx=ct.clauses.indexOf('${c}');if(activeClauseIdx>=0)renderContractBuilder(ct.id)">${c}</span>
            </div>`;
          }).join('')}
        </div>
        <!-- Clause Editor -->
        <div style="padding:14px;border-top:1px solid var(--border);">
          <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">${ct.clauses[activeClauseIdx]||'Select a clause'}</div>
          ${ct.clauses[activeClauseIdx]?`<textarea class="form-control" rows="8">${STD_CLAUSES[ct.clauses[activeClauseIdx]]||''}</textarea>`:'<div style="font-size:13px;color:var(--text-muted);">Select a clause to edit its content.</div>'}
        </div>
      </div>

      <div class="builder-preview">
        <div class="preview-doc">
          <div style="background:var(--text-primary);padding:36px 40px;color:#fff;">
            <div style="font-size:11px;font-weight:600;letter-spacing:.1em;opacity:.6;margin-bottom:8px;">SERVICE AGREEMENT</div>
            <div style="font-size:22px;font-weight:700;margin-bottom:12px;">${ct.title}</div>
            ${cl.name?`<div style="opacity:.75;font-size:13px;">Between <strong>${db.user.name}</strong> and <strong>${cl.name}${cl.company?' ('+cl.company+')':''}</strong></div>`:''}
            <div style="margin-top:8px;font-size:12px;opacity:.55;">Dated ${fmtDate(ct.created)}</div>
          </div>
          <div style="padding:32px 40px;">
            ${ct.clauses.map((c,i)=>`
              <div style="margin-bottom:24px;">
                <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">${i+1}. ${c}</div>
                <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">${STD_CLAUSES[c]||''}</div>
              </div>`).join('')}
            <!-- Signature blocks -->
            <div style="margin-top:40px;padding-top:24px;border-top:2px solid var(--border);">
              <div style="font-size:13px;font-weight:700;margin-bottom:20px;">SIGNATURES</div>
              <div class="grid-2" style="gap:30px;">
                <div class="sig-block">
                  <div style="font-size:12px;color:var(--text-muted);margin-bottom:30px;">Service Provider</div>
                  <div class="sig-line"></div>
                  <div style="font-size:13px;font-weight:600;">${db.user.name}</div>
                  <div style="font-size:11px;color:var(--text-muted);">Date: ___________</div>
                </div>
                <div class="sig-block">
                  <div style="font-size:12px;color:var(--text-muted);margin-bottom:30px;">Client</div>
                  <div class="sig-line"></div>
                  <div style="font-size:13px;font-weight:600;">${cl.name||'Client Name'}</div>
                  <div style="font-size:11px;color:var(--text-muted);">Date: ___________</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  lucide.createIcons();
}

function toggleClause(name, checked){
  if(checked){ if(!activeContract.clauses.includes(name)) activeContract.clauses.push(name); }
  else { activeContract.clauses = activeContract.clauses.filter(c=>c!==name); }
  renderContractBuilder(activeContract.id);
}
function addClause(){
  const name = prompt('Clause name:');
  if(name){ STD_CLAUSES[name]='Enter clause content here.'; activeContract.clauses.push(name); renderContractBuilder(activeContract.id); }
}
function sendContract(id){ showToast('Contract sent to client','success'); const c=db.contracts.find(ct=>ct.id===id); if(c) c.status='sent'; renderContractsList(); }
function deleteContract(id){ openConfirm('Delete Contract','Delete this contract?',()=>{ db.contracts=db.contracts.filter(c=>c.id!==id); showToast('Contract deleted','success'); renderContractsList(); }); }
</script>

<!-- ================================================================
     INVOICES MODULE
================================================================ -->
<script>
let invoiceFilter = 'all';
let invoiceSearch = '';
let activeInvoice = null;
let invLineItems = [{desc:'Design Services', qty:1, rate:3500, tax:9},{desc:'Development', qty:1, rate:4250, tax:9}];

    <div class="page-header">

      <div class="card-header" style="flex-wrap:wrap;gap:12px;">
        <div class="filter-chips">
          ${['all','draft','sent','paid','overdue','cancelled'].map(f=>`
            <div class="chip ${invoiceFilter===f?'active':''}" onclick="invoiceFilter='${f}';renderInvoicesList()">
              ${f.charAt(0).toUpperCase()+f.slice(1)}
            </div>`).join('')}
        </div>
        <div class="search-wrap" style="width:220px;">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i>
          <input class="form-control" placeholder="Search invoices…" oninput="invoiceSearch=this.value;renderInvoicesList()" value="${invoiceSearch}">
        </div>
      </div>
      <div class="table-wrap">
        ${list.length===0?`<div class="empty-state"><div class="empty-icon"><i data-lucide="receipt" style="width:24px;height:24px;"></i></div><div class="text-md fw-500">No invoices found</div><button class="btn btn-primary mt-3" onclick="navigateTo('invoice-builder',{invoiceId:'new'})">Create Invoice</button></div>`:`
        <table class="data-table">
          <thead><tr><th>Invoice #</th><th>Client</th><th>Project</th><th>Amount</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${list.map(inv=>{
            const cl=getClient(inv.clientId);
            return `<tr style="cursor:pointer;" onclick="navigateTo('invoice-builder',{invoiceId:'${inv.id}'})">
              <td style="font-weight:700;color:var(--primary);">${inv.num}</td>
              <td><div class="flex items-center gap-2"><div class="avatar avatar-sm ${avColor(cl.colorIdx||0)}">${initials(cl.name||'?')}</div>${cl.name||'—'}</div></td>
              <td style="color:var(--text-secondary);">${inv.project}</td>
              <td style="font-weight:700;">${fmtCurrency(inv.total)}</td>
              <td style="color:${inv.status==='overdue'?'var(--danger-text)':'var(--text-secondary)'};">${fmtDate(inv.due)}</td>
              <td><span class="badge ${statusClass(inv.status)}">${inv.status}</span></td>
              <td onclick="event.stopPropagation()"><div class="td-actions">
                <button class="btn btn-sm btn-secondary" onclick="navigateTo('invoice-builder',{invoiceId:'${inv.id}'})">Open</button>
                <button class="btn btn-sm btn-ghost" onclick="markInvPaid('${inv.id}')"><i data-lucide="check" style="width:13px;height:13px;"></i></button>
                <button class="btn btn-sm btn-ghost" onclick="sendInvoice('${inv.id}')"><i data-lucide="send" style="width:13px;height:13px;"></i></button>
                <button class="btn btn-sm btn-ghost" style="color:var(--danger-text)" onclick="deleteInvoice('${inv.id}')"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>
              </div></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`}
      </div>
    </div>`;
  lucide.createIcons();
}

function renderInvoiceBuilder(invId){
  if(invId && invId!=='new'){
    activeInvoice = db.invoices.find(i=>i.id===invId)||null;
    if(activeInvoice) invLineItems=[{desc:activeInvoice.project,qty:1,rate:activeInvoice.amount,tax:9}];
  } else {
    activeInvoice = { id:'new', num:'INV-'+String(db.invoices.length+1).padStart(4,'0'), clientId:'', project:'', amount:0, tax:0, discount:0, total:0, issued:new Date().toISOString().split('T')[0], due:'', status:'draft', notes:'' };
    invLineItems = [{desc:'',qty:1,rate:0,tax:9}];
  }
  const inv = activeInvoice;
  const cl  = getClient(inv.clientId);

  document.getElementById('page-invoice-builder').innerHTML = `
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <button class="btn btn-ghost btn-sm" onclick="navigateTo('invoices')"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i></button>
        <span style="font-size:16px;font-weight:700;">${inv.num}</span>
        <span class="badge ${statusClass(inv.status)}">${inv.status}</span>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-secondary btn-sm" onclick="showToast('Draft saved','success')"><i data-lucide="save" style="width:13px;height:13px;"></i> Save Draft</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('PDF downloaded','info')"><i data-lucide="download" style="width:13px;height:13px;"></i> Download</button>
        <button class="btn btn-primary btn-sm" onclick="sendInvoice(inv.id)"><i data-lucide="send" style="width:13px;height:13px;"></i> Send</button>
      </div>
    </div>

    <div class="builder-wrap">
      <!-- Left: Form -->
      <div class="builder-panel" style="padding:20px;display:flex;flex-direction:column;gap:16px;">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Client *</label>
            <select class="form-control" onchange="inv.clientId=this.value;updateInvPreview()">
              <option value="">Select client…</option>
              ${db.clients.map(c=>`<option value="${c.id}" ${inv.clientId===c.id?'selected':''}>${c.name} — ${c.company}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Project / Description</label>
            <input class="form-control" value="${inv.project}" placeholder="Project name" oninput="inv.project=this.value;updateInvPreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Issue Date</label><input class="form-control" type="date" value="${inv.issued}" oninput="inv.issued=this.value;updateInvPreview()"></div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="form-control" type="date" value="${inv.due}" oninput="inv.due=this.value;updateInvPreview()"></div>
        </div>

        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Line Items</div>
          <div style="overflow-x:auto;">
          <table class="line-items-table">
            <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Tax%</th><th>Total</th><th></th></tr></thead>
            <tbody id="inv-line-items">
              ${invLineItems.map((li,i)=>`<tr>
                <td><input value="${li.desc}" placeholder="Service description" oninput="invLineItems[${i}].desc=this.value;updateInvPreview()"></td>
                <td><input type="number" value="${li.qty}" style="width:50px;" oninput="invLineItems[${i}].qty=+this.value;updateInvPreview()"></td>
                <td><input type="number" value="${li.rate}" style="width:80px;" oninput="invLineItems[${i}].rate=+this.value;updateInvPreview()"></td>
                <td><input type="number" value="${li.tax}" style="width:50px;" oninput="invLineItems[${i}].tax=+this.value;updateInvPreview()"></td>
                <td style="font-weight:600;">$${(li.qty*li.rate).toLocaleString()}</td>
                <td><button onclick="invLineItems.splice(${i},1);renderInvoiceBuilder(inv.id)" style="background:none;border:none;cursor:pointer;color:var(--danger-text);"><i data-lucide="x" style="width:12px;height:12px;"></i></button></td>
              </tr>`).join('')}
            </tbody>
          </table>
          </div>
          <button class="btn btn-sm btn-secondary mt-2" style="width:100%;" onclick="invLineItems.push({desc:'',qty:1,rate:0,tax:9});renderInvoiceBuilder(inv.id)">+ Add Line Item</button>
        </div>

        <div class="form-row">
          <div class="form-group"><label class="form-label">Discount ($)</label><input class="form-control" type="number" value="${inv.discount||0}" oninput="inv.discount=+this.value;updateInvPreview()"></div>
          <div class="form-group"><label class="form-label">Currency</label>
            <select class="form-control"><option>USD</option><option>EUR</option><option>GBP</option><option>INR</option></select>
          </div>
        </div>

        <div class="form-group"><label class="form-label">Notes / Payment Instructions</label>
          <textarea class="form-control" rows="3" placeholder="Bank transfer: Account #XXXXX\nThank you for your business!" oninput="updateInvPreview()">${inv.notes||''}</textarea>

        <div style="background:var(--bg);border-radius:var(--radius);padding:14px;font-size:13px;display:flex;flex-direction:column;gap:8px;" id="inv-totals">
          ${buildInvTotals(inv)}
        </div>

        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-secondary btn-sm" onclick="markInvPaid(inv.id)"><i data-lucide="check-circle" style="width:13px;height:13px;"></i> Mark Paid</button>
          <button class="btn btn-secondary btn-sm" onclick="showToast('Reminder sent','success')"><i data-lucide="bell" style="width:13px;height:13px;"></i> Send Reminder</button>
        </div>
      </div>

      <div class="builder-preview">
        <div class="preview-doc" id="inv-preview">
          ${buildInvoicePreview(inv)}
        </div>
      </div>
    </div>
  `;
