}

function buildInvTotals(inv){
  const sub  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const disc = inv.discount||0;
  const tot  = sub+tax-disc;
  return `
    <div class="flex justify-between"><span style="color:var(--text-secondary);">Subtotal</span><span>${fmtCurrency(sub)}</span></div>
    <div class="flex justify-between"><span style="color:var(--text-secondary);">Tax</span><span>${fmtCurrency(tax)}</span></div>
    ${disc?`<div class="flex justify-between"><span style="color:var(--success-text);">Discount</span><span style="color:var(--success-text);">-${fmtCurrency(disc)}</span></div>`:''}
    <div class="flex justify-between fw-700" style="border-top:1px solid var(--border);padding-top:8px;font-size:15px;color:var(--primary);"><span>Total Due</span><span>${fmtCurrency(tot)}</span></div>`;
}

function buildInvoicePreview(inv){
  const cl  = getClient(inv.clientId);
  const sub  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const disc = inv.discount||0;
  const tot  = sub+tax-disc;

  return `
    <div style="padding:36px 40px;border-bottom:3px solid var(--primary);">
      <div class="flex justify-between items-start mb-4">
        <div>
          <div style="font-size:22px;font-weight:800;color:var(--text-primary);letter-spacing:-.5px;">INVOICE</div>
          <div style="font-size:13px;color:var(--primary);font-weight:600;">${inv.num}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:16px;font-weight:700;">${db.user.name}</div>
          <div style="font-size:12px;color:var(--text-muted);">DealSuite Account</div>
        </div>
      </div>
      <div class="flex justify-between" style="margin-top:20px;">
        <div>
          <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Bill To</div>
          <div style="font-weight:600;font-size:14px;">${cl.name||'Client Name'}</div>
          <div style="color:var(--text-secondary);font-size:13px;">${cl.company||''}</div>
          <div style="color:var(--text-secondary);font-size:13px;">${cl.email||''}</div>
        </div>
        <div style="text-align:right;">
          <div style="margin-bottom:6px;"><span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Issue Date</span><br><span style="font-size:13px;font-weight:500;">${fmtDate(inv.issued)}</span></div>
          <div><span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Due Date</span><br><span style="font-size:13px;font-weight:500;color:${inv.status==='overdue'?'var(--danger-text)':'inherit'};">${inv.due?fmtDate(inv.due):'—'}</span></div>
        </div>
      </div>
    </div>
    <div style="padding:28px 40px;">
      <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:20px;">
        <thead><tr style="background:var(--bg);">${['Description','Qty','Rate','Tax','Amount'].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;">${h}</th>`).join('')}</tr></thead>
        <tbody>${invLineItems.map(li=>`<tr style="border-bottom:1px solid var(--border-light);">
          <td style="padding:10px;">${li.desc}</td>
          <td style="padding:10px;">${li.qty}</td>
          <td style="padding:10px;">$${li.rate.toLocaleString()}</td>
          <td style="padding:10px;">${li.tax}%</td>
          <td style="padding:10px;font-weight:600;">$${(li.qty*li.rate).toLocaleString()}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="float:right;width:240px;font-size:13px;">
        <div class="flex justify-between" style="padding:6px 0;"><span style="color:var(--text-secondary);">Subtotal</span><span>$${sub.toLocaleString()}</span></div>
        <div class="flex justify-between" style="padding:6px 0;"><span style="color:var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
        ${disc?`<div class="flex justify-between" style="padding:6px 0;color:var(--success-text);"><span>Discount</span><span>-$${disc}</span></div>`:''}
        <div class="flex justify-between" style="padding:10px 0;border-top:2px solid var(--primary);font-size:16px;font-weight:700;color:var(--primary);"><span>Total</span><span>$${tot.toFixed(2)}</span></div>
      </div>
      <div style="clear:both;padding-top:20px;margin-top:20px;border-top:1px solid var(--border);">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Notes</div>
        <div style="font-size:13px;color:var(--text-secondary);">${inv.notes||'Thank you for your business!'}</div>
      </div>
    </div>`;
}

function updateInvPreview(){
  const el = document.getElementById('inv-preview');
  const totEl = document.getElementById('inv-totals');
  if(el && activeInvoice){ el.innerHTML = buildInvoicePreview(activeInvoice); }
  if(totEl && activeInvoice){ totEl.innerHTML = buildInvTotals(activeInvoice); }
}

function markInvPaid(id){
  const inv = db.invoices.find(i=>i.id===id)||activeInvoice;

              <div class="timeline-dot icon-box-${col}" style="width:36px;height:36px;background:var(--${col==='blue'?'blue-light':col==='orange'?'orange-bg':col==='muted'?'bg-alt':col+'-light'});color:var(--${col==='blue'?'blue':col==='orange'?'orange-text':col==='muted'?'text-secondary':col});">

function filterActivity(el, type){
  document.querySelectorAll('#page-activity .chip').forEach(c=>c.classList.remove('active'));

let galleryTab = 'type';
let galleryActiveCat = 'all';
let galleryDocType = 'proposal';

function openTemplateGallery(docType='proposal'){
  galleryDocType = docType;
  galleryActiveCat = docType==='all' ? 'all' : docType;
  galleryTab = 'type';
  document.getElementById('template-gallery-overlay').style.display = 'block';
  document.getElementById('gtab-type').style.cssText += ';border-bottom:2px solid #fff;color:#fff;';
  document.getElementById('gtab-industry').style.cssText += ';border-bottom:2px solid transparent;color:#666;';
  document.getElementById('gallery-type-cats').style.display = 'block';
  document.getElementById('gallery-industry-cats').style.display = 'none';
  document.getElementById('gallery-type-cats').innerHTML = buildGalleryCats('type');
  document.getElementById('gallery-industry-cats').innerHTML = buildGalleryCats('industry');
  // Set active type cat
  const activeCat = document.querySelector(`#gallery-type-cats [data-cat="${docType}"]`);
  if(activeCat){ document.querySelectorAll('#gallery-type-cats .gallery-cat-item').forEach(i=>i.classList.remove('active')); activeCat.classList.add('active'); }
  renderGalleryGrid();
  lucide.createIcons();
}
function closeTemplateGallery(){ document.getElementById('template-gallery-overlay').style.display='none'; }

function buildGalleryCats(tab){
  const cats = tab==='type' ? GALLERY_TYPE_CATS : GALLERY_INDUSTRY_CATS;
  return cats.map((c,i)=>`
    <div class="gallery-cat-item ${i===0?'active':''}" data-cat="${c.id}" onclick="selectGalleryCat('${c.id}',this,'${tab}')">
      <span>${c.label}</span><span class="gallery-cat-count">${c.count}</span>
    </div>`).join('');
}

function switchGalleryTab(tab){
  galleryTab = tab;
  galleryActiveCat = 'all';
  const isType = tab==='type';
  document.getElementById('gtab-type').style.borderBottom = isType?'2px solid #fff':'2px solid transparent';
  document.getElementById('gtab-type').style.color = isType?'#fff':'#666';
  document.getElementById('gtab-industry').style.borderBottom = !isType?'2px solid #fff':'2px solid transparent';
  document.getElementById('gtab-industry').style.color = !isType?'#fff':'#666';
  document.getElementById('gallery-type-cats').style.display = isType?'block':'none';
  document.getElementById('gallery-industry-cats').style.display = !isType?'block':'none';
  renderGalleryGrid();
}

function selectGalleryCat(catId, el, tab){
  galleryActiveCat = catId;
  const container = document.getElementById('gallery-'+(tab==='type'?'type':'industry')+'-cats');
  container.querySelectorAll('.gallery-cat-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  renderGalleryGrid();
}

function filterGallery(){ renderGalleryGrid(); }

function renderGalleryGrid(){
  const q = (document.getElementById('gallery-search')?.value||'').toLowerCase();
  let tpls = GALLERY_TEMPLATES;
  if(galleryTab==='type' && galleryActiveCat!=='all') tpls=tpls.filter(t=>t.type===galleryActiveCat);
  if(galleryTab==='industry' && galleryActiveCat!=='all') tpls=tpls.filter(t=>t.industry===galleryActiveCat);
  if(q) tpls=tpls.filter(t=>t.name.toLowerCase().includes(q));
  const grid = document.getElementById('gallery-grid');
  if(!grid) return;
  if(!tpls.length){ grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:#555;font-size:14px;">No templates found</div>`; return; }
  grid.innerHTML = tpls.map(t=>{
    const [g1,g2]=t.grad;
    const tc=t.lightText?'#333':'#fff';
    const mc=t.lightText?'rgba(0,0,0,.5)':'rgba(255,255,255,.6)';
    const thumb = t.isBlank ? `
      <div style="background:#fff;margin:12px 10px 0;border-radius:6px 6px 0 0;flex:1;padding:10px;overflow:hidden;">
        <div style="height:5px;background:#e5e7eb;border-radius:3px;width:70%;margin-bottom:5px;"></div>
        <div style="height:4px;background:#f3f4f6;border-radius:2px;width:50%;margin-bottom:8px;"></div>
        <div style="height:3px;background:#f3f4f6;border-radius:2px;margin-bottom:3px;"></div>
        <div style="height:3px;background:#f3f4f6;border-radius:2px;width:80%;margin-bottom:3px;"></div>
        <div style="height:3px;background:#f3f4f6;border-radius:2px;width:60%;"></div>
      </div>` : `
      <div style="background:linear-gradient(135deg,${g1},${g2});flex:1;padding:16px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;">
        <div style="position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.07);"></div>
        <div style="font-size:7px;font-weight:700;letter-spacing:.1em;color:${mc};text-transform:uppercase;margin-bottom:5px;">${t.type.toUpperCase()}</div>
        <div style="font-size:11px;font-weight:700;color:${tc};line-height:1.3;">${t.name}</div>
      </div>
      <div style="background:#fff;margin:0 10px;height:44px;padding:8px;overflow:hidden;flex-shrink:0;">
        <div style="height:3px;background:#f3f4f6;border-radius:2px;width:65%;margin-bottom:4px;"></div>
        <div style="height:3px;background:#f3f4f6;border-radius:2px;width:90%;margin-bottom:4px;"></div>
        <div style="height:3px;background:#f3f4f6;border-radius:2px;width:75%;"></div>
      </div>`;
    return `<div class="tpl-card" onclick="applyTemplate('${t.id}')">
      <div style="height:220px;display:flex;flex-direction:column;background:${t.isBlank?'#f8f8f8':'#0f0f0f'};">${thumb}</div>
      <div class="tpl-card-footer">
        <div class="tpl-card-name">${t.name}</div>
        <button class="${t.isBlank?'tpl-scratch-btn':'tpl-use-btn'}">${t.isBlank?'Start from scratch':'Use Template'}</button>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

function applyTemplate(tplId){
  const tpl = GALLERY_TEMPLATES.find(t=>t.id===tplId);
  closeTemplateGallery();
  if(!tpl) return;
  if(tpl.type==='contract') navigateTo('contract-builder',{contractId:'new'});
  else if(tpl.type==='invoice') navigateTo('invoice-builder',{invoiceId:'new'});
  else navigateTo('proposal-builder',{proposalId:'new'});
  showToast(`Template "${tpl.name}" applied`,'success');
}
</script>

<script>
const EXPENSE_CATS = ['Travel','Software & Subscriptions','Equipment','Meals & Entertainment','Office Supplies','Professional Services','Marketing','Other'];
db.expenses = [
  { id:'exp1', desc:'Adobe Creative Suite',         cat:'Software & Subscriptions', amount:54.99,  date:'2024-11-01', invoiceId:null,   receipt:false, notes:'Monthly subscription' },
  { id:'exp2', desc:'Client lunch — Sarah Johnson', cat:'Meals & Entertainment',    amount:87.50,  date:'2024-11-15', invoiceId:'inv1', receipt:true,  notes:'Project kickoff lunch' },
  { id:'exp3', desc:'Flight to NYC — Marcus meeting',cat:'Travel',                  amount:312.00, date:'2024-11-18', invoiceId:null,   receipt:true,  notes:'Round trip JFK' },
  { id:'exp4', desc:'Figma Pro annual',              cat:'Software & Subscriptions', amount:144.00, date:'2024-11-20', invoiceId:null,   receipt:false, notes:'Annual renewal' },
  { id:'exp5', desc:'External SSD 1TB',              cat:'Equipment',               amount:89.99,  date:'2024-11-22', invoiceId:null,   receipt:true,  notes:'For client deliverables' },
];
let expenseFilter='all', expenseSearch='';

function renderExpenses(){
  const page = document.getElementById('page-expenses');
  if(!page) return;
  let list = db.expenses;
  if(expenseFilter!=='all') list=list.filter(e=>e.cat===expenseFilter);
  if(expenseSearch) list=list.filter(e=>(e.desc+e.cat).toLowerCase().includes(expenseSearch.toLowerCase()));
  const totalAll=db.expenses.reduce((s,e)=>s+e.amount,0);
  const totalMonth=db.expenses.filter(e=>e.date.startsWith('2024-11')).reduce((s,e)=>s+e.amount,0);
  const billable=db.expenses.filter(e=>e.invoiceId).reduce((s,e)=>s+e.amount,0);

  page.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Expenses</div><div class="page-subtitle">Track and categorize your business expenses</div></div>
      <button class="btn btn-primary" onclick="openAddExpenseModal()"><i data-lucide="plus" style="width:14px;height:14px;"></i> Add Expense</button>
    </div>
    <div class="stats-grid-4 mb-5">
      ${[{label:'Total Expenses',val:fmtCurrency(totalAll),icon:'receipt',color:'danger'},{label:'This Month',val:fmtCurrency(totalMonth),icon:'calendar',color:'orange'},{label:'Billable',val:fmtCurrency(billable),icon:'link',color:'teal'},{label:'Non-Billable',val:fmtCurrency(totalAll-billable),icon:'x-circle',color:'muted'}].map(s=>`
      <div class="stat-card"><div class="stat-card-top"><div><div class="stat-card-label">${s.label}</div><div style="font-size:20px;font-weight:700;margin-top:4px;">${s.val}</div></div><div class="icon-box icon-box-md icon-box-${s.color}"><i data-lucide="${s.icon}" style="width:18px;height:18px;"></i></div></div></div>`).join('')}
    </div>
    <div class="card mb-5">
      <div class="card-header" style="flex-wrap:wrap;gap:12px;">
        <div class="filter-chips">
          <div class="chip ${expenseFilter==='all'?'active':''}" onclick="expenseFilter='all';renderExpenses()">All</div>
          ${EXPENSE_CATS.slice(0,5).map(c=>`<div class="chip ${expenseFilter===c?'active':''}" onclick="expenseFilter='${c}';renderExpenses()">${c}</div>`).join('')}
        </div>
        <div class="search-wrap" style="width:220px;"><i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i><input class="form-control" placeholder="Search expenses…" oninput="expenseSearch=this.value;renderExpenses()" value="${expenseSearch}"></div>
      </div>
      <div class="table-wrap">
        ${list.length===0?`<div class="empty-state"><div class="empty-icon"><i data-lucide="wallet" style="width:24px;height:24px;"></i></div><div class="text-md fw-500">No expenses found</div><button class="btn btn-primary mt-3" onclick="openAddExpenseModal()">Add Expense</button></div>`:`
        <table class="data-table"><thead><tr><th>Description</th><th>Category</th><th>Date</th><th>Amount</th><th>Receipt</th><th>Billable To</th><th>Actions</th></tr></thead>
        <tbody>${list.map(exp=>{
          const inv=db.invoices.find(i=>i.id===exp.invoiceId);
          return `<tr>
            <td style="font-weight:500;">${exp.desc}</td>
            <td><span class="badge badge-muted">${exp.cat}</span></td>
            <td style="color:var(--text-secondary);">${fmtDate(exp.date)}</td>
            <td style="font-weight:700;">${fmtCurrency(exp.amount)}</td>
            <td>${exp.receipt?'<span class="badge badge-success">Yes</span>':'<span class="badge badge-muted">No</span>'}</td>
            <td>${inv?`<span class="badge badge-info">${inv.num}</span>`:'<span style="color:var(--text-muted);">—</span>'}</td>
            <td><div class="td-actions">
              <button class="btn btn-sm btn-secondary" onclick="openAddExpenseModal('${exp.id}')"><i data-lucide="pencil" style="width:12px;height:12px;"></i></button>
              <button class="btn btn-sm btn-ghost" style="color:var(--danger-text)" onclick="deleteExpense('${exp.id}')"><i data-lucide="trash-2" style="width:12px;height:12px;"></i></button>
            </div></td>
          </tr>`;
        }).join('')}</tbody></table>`}
      </div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">Breakdown by Category</div></div><div class="card-body">${buildExpenseBreakdown()}</div></div>`;
  lucide.createIcons();
}

function buildExpenseBreakdown(){
  const cats={};
  db.expenses.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amount;});
  const total=Object.values(cats).reduce((s,v)=>s+v,0);
  const colors=['var(--primary)','var(--teal)','var(--blue)','var(--lavender)','var(--orange-text)','var(--danger-text)'];
  return Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div style="width:10px;height:10px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:13px;">${cat}</span><span style="font-size:13px;font-weight:600;">${fmtCurrency(amt)}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(amt/total*100).toFixed(0)}%;background:${colors[i%colors.length]};"></div></div>
      </div>
      <span style="font-size:12px;color:var(--text-muted);width:32px;text-align:right;">${(amt/total*100).toFixed(0)}%</span>
    </div>`).join('');
}

function openAddExpenseModal(editId=null){
  const e=editId?db.expenses.find(ex=>ex.id===editId):null;
  openModal(`
    <div class="modal-header"><span class="modal-title">${e?'Edit':'Add'} Expense</span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group"><label class="form-label">Description *</label><input class="form-control" id="exp-desc" value="${e?e.desc:''}" placeholder="e.g. Adobe Creative Suite"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category</label><select class="form-control" id="exp-cat">${EXPENSE_CATS.map(c=>`<option ${e&&e.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Amount *</label><input class="form-control" id="exp-amount" type="number" step="0.01" value="${e?e.amount:''}" placeholder="0.00"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date</label><input class="form-control" id="exp-date" type="date" value="${e?e.date:new Date().toISOString().split('T')[0]}"></div>
        <div class="form-group"><label class="form-label">Attach to Invoice</label><select class="form-control" id="exp-invoice"><option value="">Not billable</option>${db.invoices.map(inv=>`<option value="${inv.id}" ${e&&e.invoiceId===inv.id?'selected':''}>${inv.num}</option>`).join('')}</select></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-control" id="exp-notes" value="${e?e.notes:''}" placeholder="Optional notes"></div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;"><input type="checkbox" id="exp-receipt" ${e&&e.receipt?'checked':''} style="accent-color:var(--primary);"> Receipt attached</label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExpense('${editId||''}')"><i data-lucide="check" style="width:14px;height:14px;"></i> ${e?'Save':'Add'} Expense</button>
    </div>`);
}

function saveExpense(editId){
  const desc=document.getElementById('exp-desc').value.trim();
  const amount=parseFloat(document.getElementById('exp-amount').value);
  if(!desc||!amount){showToast('Description and amount required','error');return;}
  const data={desc,cat:document.getElementById('exp-cat').value,amount,date:document.getElementById('exp-date').value,invoiceId:document.getElementById('exp-invoice').value||null,notes:document.getElementById('exp-notes').value,receipt:document.getElementById('exp-receipt').checked};
  if(editId){Object.assign(db.expenses.find(e=>e.id===editId),data);showToast('Expense updated','success');}
  else{db.expenses.push({id:'exp'+Date.now(),...data});showToast('Expense added','success');}
  closeModal();renderExpenses();
}

function deleteExpense(id){
  openConfirm('Delete Expense','Delete this expense?',()=>{db.expenses=db.expenses.filter(e=>e.id!==id);showToast('Expense deleted','success');renderExpenses();});
}
</script>

              ${[['Send automatically on issue date','auto-send'],['Send reminder 3 days before due','remind-before'],['Send overdue reminder','remind-overdue']].map(([l,id])=>`

function setInvType(type, btn){
  if(activeInvoice) activeInvoice.type = type;
  document.querySelectorAll('#inv-type-btns button').forEach(b=>{
    b.style.borderColor = 'var(--border)';
    b.style.background = 'var(--surface)';
    b.style.color = 'var(--text-secondary)';
  });
  btn.style.borderColor = 'var(--primary)';
  btn.style.background = 'var(--primary-light)';
  btn.style.color = 'var(--primary)';
  document.getElementById('recurring-opts').style.display = type==='recurring' ? 'block' : 'none';
  document.getElementById('deposit-opts').style.display   = type==='deposit'   ? 'block' : 'none';
}

function setLoginRole(role, btn){
  loginRole = role;
  document.querySelectorAll('#login-role-tabs button').forEach(b=>{
    b.style.background = 'transparent';
    b.style.color = '#6B7280';
    b.style.fontWeight = '500';
  });
  btn.style.background = '#5347CE';
  btn.style.color = '#fff';
  btn.style.fontWeight = '600';
  if(role==='admin'){
    document.getElementById('login-email').value = 'admin@dealsuite.io';

  } else {
    document.getElementById('login-email').value = 'exec@dealsuite.io';
    document.getElementById('login-pass').value  = 'exec123';
  }
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const user  = AUTH_USERS.find(u=>u.email===email && u.password===pass);
  const errEl = document.getElementById('login-error');
  if(!user){
    errEl.style.display = 'block';
    errEl.textContent = 'Invalid email or password. Please try again.';
    return;
  }
  errEl.style.display = 'none';
  currentUser = user;
  db.user = { name: user.name, role: user.role==='admin'?'Admin':'Executive', email: user.email };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildPageContainers();
  buildSidebar();
  buildHeader();
  navigateTo('dashboard');
}

  currentUser = null;

// ── INVOICES — fully dynamic ──
window.saveInvoice = function(){
  if(!activeInvoice) return;
  const inv = activeInvoice;
  const sub = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  inv.amount = sub;
  inv.tax = Math.round(tax);
  inv.total = Math.round(sub + tax - (inv.discount||0));
  if(!db.invoices.find(x=>x.id===inv.id)){
    inv.id = 'inv'+Date.now();
    inv.num = 'INV-'+String(db.invoices.length+1).padStart(4,'0');
    db.invoices.push(inv);
    logActivity('invoice','created',inv.num+' — '+fmtCurrency(inv.total),inv.clientId);

};

//  LOCAL STORAGE PERSISTENCE — data survives page refresh
// ═══════════════════════════════════════════════════════════════════
const LS_KEY = 'dealsuite_db_v2';
const LS_AUTH = 'dealsuite_auth_v2';

function saveToStorage(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      clients: db.clients, proposals: db.proposals, contracts: db.contracts,
      invoices: db.invoices, payments: db.payments, templates: db.templates,
      activity: db.activity, expenses: db.expenses || []
    }));
  } catch(e){ console.warn('Storage save failed', e); }
}

function loadFromStorage(){
  try {
    const saved = localStorage.getItem(LS_KEY);
    if(saved){
      const data = JSON.parse(saved);
      Object.assign(db, data);
      if(!db.expenses) db.expenses = [];
    }
  } catch(e){ console.warn('Storage load failed', e); }
}

function saveAuthToStorage(user){
  try { localStorage.setItem(LS_AUTH, JSON.stringify({id:user.id,email:user.email})); } catch(e){}
}
function loadAuthFromStorage(){
  try {
    const saved = localStorage.getItem(LS_AUTH);
    if(saved){ const {id,email}=JSON.parse(saved); return AUTH_USERS.find(u=>u.id===id&&u.email===email)||null; }
  } catch(e){}
  return null;
}
function clearAuthStorage(){ try{ localStorage.removeItem(LS_AUTH); }catch(e){} }

// Patch all mutation functions to auto-save
function withSave(fn){ return function(...args){ const r=fn.apply(this,args); saveToStorage(); return r; }; }

// Auto-save on every db mutation — proxy key arrays
['clients','proposals','contracts','invoices','payments','expenses','activity'].forEach(key=>{
  const orig = db[key];
  // We'll just call saveToStorage() at end of each operation
});

// ── GLOBAL HEADER SEARCH — open and filter ──
window.openGlobalSearch = function(){
  const q = document.querySelector('.header-search input')?.value?.toLowerCase() || '';
  if(!q) return;
  // Search across all data
  const results = [];
  db.clients.forEach(c=>{ if((c.name+c.company+c.email).toLowerCase().includes(q)) results.push({type:'Client',label:c.name+' — '+c.company,action:()=>navigateTo('client-detail',{clientId:c.id})}); });
  db.proposals.forEach(p=>{ if((p.title+(getClient(p.clientId).name||'')).toLowerCase().includes(q)) results.push({type:'Proposal',label:p.title,action:()=>navigateTo('proposal-builder',{proposalId:p.id})}); });
  db.contracts.forEach(c=>{ if((c.title+(getClient(c.clientId).name||'')).toLowerCase().includes(q)) results.push({type:'Contract',label:c.title,action:()=>navigateTo('contract-builder',{contractId:c.id})}); });
  db.invoices.forEach(i=>{ if((i.num+i.project+(getClient(i.clientId).name||'')).toLowerCase().includes(q)) results.push({type:'Invoice',label:i.num+' — '+i.project,action:()=>navigateTo('invoice-builder',{invoiceId:i.id})}); });
  if(!results.length){ showToast('No results for "'+q+'"','info'); return; }
  showModal('Search Results for "'+q+'"', `
    <div style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;">
      ${results.map((r,i)=>`
        <div onclick="closeModal();window.__searchActions[${i}]()" style="padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s;" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
          <span style="font-size:10px;font-weight:700;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:99px;white-space:nowrap;">${r.type}</span>
          <span style="font-size:13px;font-weight:500;">${r.label}</span>
        </div>`).join('')}
    </div>`, []);
  window.__searchActions = results.map(r=>r.action);
};

window._useTemplate = function(tplId){
  const t = db.templates.find(x=>x.id===tplId);
  if(!t){ showToast('Template not found','error'); return; }
  t.uses = (t.uses||0)+1;
  const c = t.content||{};

  if(t.category==='proposals'||t.category==='emails'){
    activeProposal = {
      id: 'prop_'+Date.now(),
      title: t.name,
      clientId: '', status: 'draft', amount: 0, currency: 'USD',
      sections: c.sections||['Cover Page','Introduction','Scope of Work','Deliverables','Timeline','Fee Summary','Terms & Conditions'],
      sectionContent: {...(c.sectionContent||{})},
      created: new Date().toISOString().split('T')[0],
      expires: ''
    };
    lineItems = c.lineItems ? [...c.lineItems.map(li=>({...li}))] : [{desc:'',qty:1,rate:0,tax:9}];

      id: 'ct_'+Date.now(),

      clientId: '', status: 'draft', value: 0,
      created: new Date().toISOString().split('T')[0],
      expires: '',
      clauses: c.clauses ? [...c.clauses] : Object.keys(STD_CLAUSES||{}).slice(0,5),

      id: 'inv_'+Date.now(), num,

window._saveTemplateEdit = function(tplId){
  const t = db.templates.find(x=>x.id===tplId);
  if(!t) return;
  if(!t.content) t.content = {};
  const c = t.content;
  const isProposal = t.category==='proposals'||t.category==='emails';
  const isContract = t.category==='contracts';
  const isInvoice  = t.category==='invoices';

  const nameEl = document.getElementById('tpl-name');
  const descEl = document.getElementById('tpl-desc');
  if(nameEl) t.name = nameEl.value;
  if(descEl) t.desc = descEl.value;

  if(isProposal){
    const sections = c.sections||['Introduction','Scope of Work','Deliverables','Timeline','Terms & Conditions'];
    if(!c.sectionContent) c.sectionContent = {};
    sections.filter(s=>s!=='Cover Page'&&s!=='Fee Summary').forEach(s=>{
      const el = document.getElementById('tpl-sec-'+s.replace(/\s+/g,'-').toLowerCase());
      if(el) c.sectionContent[s] = el.value;
    });
    // Read line items
    const lis = [];
    for(let i=0;i<10;i++){
      const d=document.getElementById('tpl-li-desc-'+i);
      if(!d) break;
      lis.push({desc:d.value, qty:+(document.getElementById('tpl-li-qty-'+i)?.value||1), rate:+(document.getElementById('tpl-li-rate-'+i)?.value||0), tax:+(document.getElementById('tpl-li-tax-'+i)?.value||9)});
    }
    if(lis.length) c.lineItems = lis;
  } else if(isContract){
    const clauses = c.clauses||Object.keys(STD_CLAUSES||{}).slice(0,5);
    if(!c.clauseContent) c.clauseContent = {};
    clauses.forEach(cl=>{
      const el = document.getElementById('tpl-cl-'+cl.replace(/\s+/g,'-').toLowerCase());
      if(el) c.clauseContent[cl] = el.value;
    });
  } else if(isInvoice){
    const lis = [];
    for(let i=0;i<10;i++){
      const d=document.getElementById('tpl-li-desc-'+i);
      if(!d) break;
      lis.push({desc:d.value, qty:+(document.getElementById('tpl-li-qty-'+i)?.value||1), rate:+(document.getElementById('tpl-li-rate-'+i)?.value||0), tax:+(document.getElementById('tpl-li-tax-'+i)?.value||9)});
    }
    if(lis.length) c.lineItems = lis;
  }

  saveToStorage();
  closeModal();
  renderTemplates();
  showToast('Template saved!','success');
};

window._duplicateTemplate = function(tplId){
  const t = db.templates.find(x=>x.id===tplId);
  if(!t) return;
  const copy = JSON.parse(JSON.stringify(t));
  copy.id = 'tpl_'+Date.now();
  copy.name = t.name+' (Copy)';
  copy.uses = 0;
  db.templates.push(copy);
  saveToStorage();
  renderTemplates();
  showToast('Template duplicated!','success');
};

window._deleteTemplate = function(tplId){
  openConfirm('Delete Template','Delete this template? This cannot be undone.',()=>{
    db.templates = db.templates.filter(t=>t.id!==tplId);
    saveToStorage();
    renderTemplates();
    showToast('Template deleted','success');
  });
};

// Create contract from accepted proposal
window._createContractFromProposal = function(propId){
  const p = db.proposals.find(x=>x.id===propId)||activeProposal;
  if(!p){ showToast('Proposal not found','error'); return; }
  const sc = p.sectionContent||{};
  // Build contract with relevant content from proposal
  activeContract = {
    id: 'ct_'+Date.now(),
    title: p.title + ' — Service Agreement',
    clientId: p.clientId,
    status: 'draft',
    value: p.amount||0,
    created: new Date().toISOString().split('T')[0],
    expires: p.expires||'',
    proposalId: p.id,
    clauses: ['Scope of Work','Payment Terms','Intellectual Property','Confidentiality','Termination'],
    clauseContent: {
      'Scope of Work': sc['Scope of Work'] || STD_CLAUSES['Scope of Work'] || '',
      'Payment Terms': sc['Terms & Conditions'] || STD_CLAUSES['Payment Terms'] || '',
      'Intellectual Property': STD_CLAUSES['Intellectual Property'] || '',
      'Confidentiality': STD_CLAUSES['Confidentiality'] || '',
      'Termination': STD_CLAUSES['Termination'] || '',
    },
    signed: false
  };
  db.contracts.push(activeContract);
  window._ctActiveTab = 'clauses';
  saveToStorage();
  showToast('Contract created from proposal!','success');
  navigateTo('contract-builder', {contractId: activeContract.id});
};

// Patch _saveProposalNow to show post-save modal
const __origSaveProposal = window._saveProposalNow;
window._saveProposalNow = function(skipModal){
  if(!activeProposal) return;
  const p = activeProposal;
  const sub = lineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax = lineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  p.amount = sub+tax;
  p.lineItems = [...lineItems];
  const idx = db.proposals.findIndex(x=>x.id===p.id);
  if(idx>=0) db.proposals[idx] = p;
  else db.proposals.push(p);
  saveToStorage();
  if(!skipModal) _proposalPostSaveModal(p);
  else showToast('Proposal saved!','success');
};

  setTimeout(()=>{

    const bar = document.querySelector('#page-proposal-builder .flex.items-center.justify-between .flex.gap-2');
    if(bar && !bar.querySelector('.btn-approve')){
      const approveBtn = document.createElement('button');
      approveBtn.className = 'btn btn-sm btn-approve';
      approveBtn.style.cssText = `background:${p.status==='accepted'?'var(--success-bg)':'var(--warning-bg)'};color:${p.status==='accepted'?'var(--success-text)':'var(--warning-text)'};border:1px solid ${p.status==='accepted'?'var(--success-text)':'var(--warning-text)'};`;
      approveBtn.innerHTML = p.status==='accepted'
        ? '<i data-lucide="check-circle" style="width:13px;height:13px;"></i> Accepted'
        : '<i data-lucide="thumbs-up" style="width:13px;height:13px;"></i> Approve';
      approveBtn.onclick = ()=>{
        if(p.status==='accepted'){
          openConfirm('Create Contract','This proposal is accepted. Create a contract from it?', ()=>_createContractFromProposal(p.id), 'Create Contract');
        } else {
          openConfirm('Approve Proposal','Approve this proposal? A contract will be created automatically so you can send it for signing.', ()=>{
            p.status='accepted';
            _saveProposalNow(true);
            _createContractFromProposal(p.id);
          }, 'Approve & Create Contract');
        }
      };
      // Insert before Save Draft button
      const saveBtn = bar.querySelector('.btn-secondary');
      if(saveBtn) bar.insertBefore(approveBtn, saveBtn);
      else bar.prepend(approveBtn);
      lucide.createIcons();
    }
  }, 100);
};

// Wrap key mutation functions to auto-persist
['saveProposal','saveContract','saveInvoice','deleteProposal','deleteContract','deleteInvoice',
 'deleteClient','addExpense','deleteExpense','recordPayment','signContract','changeProposalStatus',
 'toggleUserRole','markInvPaid'].forEach(fn=>{
  if(typeof window[fn]==='function'){
    const orig = window[fn];

});

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function _propSectionDefault(s){
  const d = {
    'Cover Page': '',
    'Introduction': 'Thank you for the opportunity to present this proposal. We are excited to partner with you on this project.',
    'Scope of Work': '• Website design and development\n• Brand identity refinement\n• Content strategy\n• SEO optimization',
    'Deliverables': '• Final design files (Figma)\n• Responsive website (3 pages)\n• Style guide\n• 30-day post-launch support',
    'Timeline': 'Week 1–2: Discovery & strategy\nWeek 3–4: Design concepts\nWeek 5–6: Development\nWeek 7: Testing & launch',
    'Terms & Conditions': '50% deposit required to begin work. Remaining balance due upon project completion. All work remains property of client upon final payment.',
  };
  return d[s] || '';
}

function _buildPropSectionEditor(section, p){
  if(!section) return '<div style="color:var(--text-muted);font-size:13px;">Select a section to edit</div>';
  if(!p.sectionContent) p.sectionContent = {};
  const val = escHtml(p.sectionContent[section] || '');

  if(section === 'Cover Page') return `
    <div style="font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">Cover Page</div>
    <div class="form-group mb-3"><label class="form-label">Proposal Title</label>
      <input class="form-control" value="${escHtml(p.title)}" oninput="activeProposal.title=this.value;document.getElementById('prop-title-input').value=this.value;_refreshPropPreview()"></div>
    <div class="form-group mb-3"><label class="form-label">Tagline</label>
      <input class="form-control" id="prop-tagline" value="${escHtml(p.tagline||'')}" placeholder="e.g. Transforming your digital presence" oninput="activeProposal.tagline=this.value;_refreshPropPreview()"></div>
    <div class="form-group mb-3"><label class="form-label">Valid Until</label>
      <input class="form-control" type="date" value="${p.expires||''}" oninput="activeProposal.expires=this.value;_refreshPropPreview()"></div>
    <div class="form-group"><label class="form-label">Cover Color</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
        ${[['#5347CE','Purple'],['#0F9E9D','Teal'],['#2563EB','Blue'],['#DC2626','Red'],['#111827','Dark']].map(([c,n])=>`
          <button onclick="activeProposal.coverColor='${c}';_refreshPropPreview()" style="width:28px;height:28px;border-radius:50%;background:${c};border:3px solid ${(p.coverColor||'#5347CE')===c?'#fff':'transparent'};outline:2px solid ${(p.coverColor||'#5347CE')===c?c:'transparent'};cursor:pointer;" title="${n}"></button>
        `).join('')}
      </div>
    </div>`;

  if(section === 'Fee Summary') return _buildFeeSummaryEditor();

  return `
    <div style="font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">${escHtml(section)}</div>
    <div class="form-group">
      <label class="form-label">Content</label>
      <textarea class="form-control" rows="10" placeholder="Write ${escHtml(section)} content here…"
        oninput="activeProposal.sectionContent['${section}']=this.value;_refreshPropPreview()"
      >${val}</textarea>
    </div>`;
}

    <table class="line-items-table" style="margin-bottom:8px;">
      <thead><tr><th style="width:40%;">Description</th><th>Qty</th><th>Rate</th><th>Tax%</th><th>Total</th><th></th></tr></thead>
      <tbody>
        ${lineItems.map((li,i)=>`<tr>
          <td><input value="${escHtml(li.desc)}" oninput="lineItems[${i}].desc=this.value;_refreshPropPreview()"></td>
          <td><input type="number" value="${li.qty}" style="width:50px;" oninput="lineItems[${i}].qty=+this.value;_refreshPropPreview()"></td>
          <td><input type="number" value="${li.rate}" style="width:80px;" oninput="lineItems[${i}].rate=+this.value;_refreshPropPreview()"></td>
          <td><input type="number" value="${li.tax}" style="width:50px;" oninput="lineItems[${i}].tax=+this.value;_refreshPropPreview()"></td>

        </tr>`).join('')}
      </tbody>
    </table>

    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:12px;display:flex;flex-direction:column;gap:6px;">
      <div class="flex justify-between"><span style="color:var(--text-secondary);">Subtotal</span><span>$${sub.toLocaleString()}</span></div>
      <div class="flex justify-between"><span style="color:var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
      <div class="flex justify-between fw-700" style="border-top:1px solid var(--border);padding-top:6px;font-size:14px;color:var(--primary);"><span>Total</span><span>$${total.toFixed(2)}</span></div>
    </div>`}`;
}

function _renderPropSectionEditor(){
  const p = activeProposal;
  if(!p) return;
  const el = document.getElementById('prop-section-editor');
  if(el) el.innerHTML = _buildPropSectionEditor(p.sections[activePropSection], p);
  // Update section list active state
  document.querySelectorAll('#prop-section-list .section-item').forEach((el,i)=>{
    el.classList.toggle('active', i===activePropSection);
  });
  lucide.createIcons();
}

function _refreshPropPreview(){
  const el = document.getElementById('prop-preview');
  if(el && activeProposal) el.innerHTML = _buildPropPreview(activeProposal);
  saveToStorage();
}

      ${p.expires?`<div style="margin-top:12px;font-size:11px;opacity:.7;background:rgba(255,255,255,.15);display:inline-block;padding:4px 12px;border-radius:99px;">Valid until ${fmtDate(p.expires)}</div>`:''}

    <div style="padding:32px 40px;">
      ${p.sections.filter(s=>s!=='Cover Page').map(s=>`
        <div style="margin-bottom:28px;">
          <div style="font-size:10px;font-weight:700;color:${coverColor};text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">${escHtml(s)}</div>
          ${s==='Fee Summary' ? `
            <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:14px;">
              <thead><tr style="background:var(--bg);">${['Description','Qty','Rate','Tax','Total'].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);">${h}</th>`).join('')}</tr></thead>
              <tbody>${lineItems.map(li=>`<tr style="border-bottom:1px solid var(--border-light);">
                <td style="padding:8px 10px;">${escHtml(li.desc)}</td>

            </table>

              <div class="flex justify-between" style="margin-bottom:6px;"><span style="color:var(--text-secondary);">Subtotal</span><span>$${sub.toLocaleString()}</span></div>
              <div class="flex justify-between" style="margin-bottom:6px;"><span style="color:var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
              <div class="flex justify-between" style="border-top:1px solid var(--border);padding-top:8px;font-size:15px;font-weight:700;color:${coverColor};"><span>Total</span><span>$${total.toFixed(2)}</span></div>
            </div>` :
          `<div style="font-size:13px;color:var(--text-secondary);line-height:1.8;white-space:pre-line;">${escHtml(sc[s]||_propSectionDefault(s)||'Content goes here…')}</div>`}
        </div>`).join('')}
      <div style="margin-top:32px;padding-top:20px;border-top:2px solid var(--border);display:flex;gap:12px;">

        <button class="btn btn-secondary" onclick="showToast('Proposal declined','error')">Decline</button>
      </div>
    </div>`;
}

function _saveProposalNow(){
  if(!activeProposal) return;
  const p = activeProposal;
  const sub = lineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax = lineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  p.amount = sub+tax;
  p.lineItems = [...lineItems];
  // Upsert into db.proposals
  const idx = db.proposals.findIndex(x=>x.id===p.id);
  if(idx>=0) db.proposals[idx] = p;
  else db.proposals.push(p);
  saveToStorage();
  showToast('Proposal saved!','success');
}

window._addPropSection = function(){
  if(!activeProposal) return;
  const s = prompt('Section name:','Custom Section');
  if(s && s.trim()){
    activeProposal.sections.push(s.trim());
    activeProposal.sectionContent[s.trim()] = '';
    activePropSection = activeProposal.sections.length-1;
    window.renderProposalBuilder(activeProposal.id);
  }
};
window._removePropSection = function(i){
  if(!activeProposal) return;
  activeProposal.sections.splice(i,1);
  if(activePropSection>=activeProposal.sections.length) activePropSection=Math.max(0,activeProposal.sections.length-1);
  window.renderProposalBuilder(activeProposal.id);
};
window._renderPropSectionEditor = _renderPropSectionEditor;
window._refreshPropPreview = _refreshPropPreview;
window._buildPropSectionEditor = _buildPropSectionEditor;

function _buildSigPanel(){
  const mode = window._sigMode || 'type';
  if(mode==='type') return `
    <div class="form-group">
      <label class="form-label">Type your signature</label>
      <input class="form-control" id="sig-typed" placeholder="Your full name" style="font-size:16px;" value="${escHtml(db.user.name)}" oninput="document.getElementById('sig-preview').textContent=this.value">
      <div id="sig-preview" style="margin-top:10px;padding:16px;background:var(--bg);border-radius:var(--radius);min-height:50px;font-family:'Pacifico',cursive,serif;font-size:26px;color:var(--primary);text-align:center;">${escHtml(db.user.name)}</div>
    </div>`;
  if(mode==='draw') return `
    <div>
      <canvas id="sig-canvas" width="320" height="100" style="border:1px solid var(--border);border-radius:var(--radius);cursor:crosshair;width:100%;touch-action:none;background:#fff;"></canvas>
      <button onclick="document.getElementById('sig-canvas').getContext('2d').clearRect(0,0,320,100)" class="btn btn-sm btn-secondary mt-2">Clear</button>
    </div>`;
setTimeout(function(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d'),drawing=false;
  ctx.strokeStyle='#5347CE';ctx.lineWidth=2;ctx.lineCap='round';
  function pos(e){var r=c.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(320/r.width),y:(t.clientY-r.top)*(100/r.height)};}
  c.addEventListener('mousedown',function(e){drawing=true;ctx.beginPath();var p=pos(e);ctx.moveTo(p.x,p.y);});
  c.addEventListener('mousemove',function(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  c.addEventListener('mouseup',function(){drawing=false;});
  c.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;ctx.beginPath();var p=pos(e);ctx.moveTo(p.x,p.y);});
  c.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  c.addEventListener('touchend',function(){drawing=false;});
},150);
  return `
    <div class="form-group">
      <label class="form-label">Upload signature image</label>
      <input type="file" accept="image/*" class="form-control" onchange="var r=new FileReader();r.onload=e=>{var img=document.getElementById('sig-img');img.src=e.target.result;img.style.display='block';window._uploadedSig=e.target.result;};r.readAsDataURL(this.files[0])">
      <img id="sig-img" style="display:none;max-height:80px;margin-top:10px;border-radius:var(--radius-sm);">
    </div>`;
}

function _renderSigPanel(){
  const el = document.getElementById('sig-panel-content');
  if(el) el.innerHTML = _buildSigPanel();
}

function _applySignature(){
  if(!activeContract) return;
  const mode = window._sigMode || 'type';
  let sigName = db.user.name;
  if(mode==='type'){ const inp=document.getElementById('sig-typed'); if(inp) sigName=inp.value; }
  activeContract.signed = true;
  activeContract.signedAt = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  activeContract.sigName = sigName;
  activeContract.status = 'signed';
  _saveContractNow();
  showToast('Contract signed!','success');
  renderContractBuilder(activeContract.id);
  // Offer to create invoice
  setTimeout(()=>{
    openConfirm(
      'Create Invoice?',
      'Contract is signed. Would you like to create an invoice for this project now?',
      ()=>{ _createInvoiceFromContract(activeContract.id); },
      'Create Invoice'
    );
  }, 600);
}

function _createInvoiceFromContract(ctId){
  const ct = db.contracts.find(x=>x.id===ctId)||activeContract;
  if(!ct){ showToast('Contract not found','error'); return; }
  const num = 'INV-'+String(db.invoices.length+1).padStart(4,'0');
  const inv = {
    id: 'inv_'+Date.now(),
    num, clientId: ct.clientId,
    project: ct.title.replace(' — Service Agreement',''),
    amount: ct.value||0, tax:0, discount:0,
    total: ct.value||0,
    issued: new Date().toISOString().split('T')[0],
    due: '', status:'draft', notes:'Thank you for your business!',
    type:'one-time', lateFee:1.5,
    lineItems: ct.value ? [{desc: ct.title.replace(' — Service Agreement',''), qty:1, rate:ct.value, tax:9}] : [{desc:'',qty:1,rate:0,tax:9}],
    contractId: ct.id
  };
  db.invoices.push(inv);
  activeInvoice = inv;
  invLineItems = [...inv.lineItems];
  saveToStorage();
  showToast('Invoice created from contract!','success');
  navigateTo('invoice-builder', {invoiceId: inv.id});
}
window._createInvoiceFromContract = _createInvoiceFromContract;

function _saveContractNow(){
  if(!activeContract) return;
  const idx = db.contracts.findIndex(x=>x.id===activeContract.id);
  if(idx>=0) db.contracts[idx] = activeContract;
  else db.contracts.push(activeContract);
  saveToStorage();
  showToast('Contract saved!','success');
}

function _addCtClause(){
  if(!activeContract) return;
  const name = prompt('Clause name:','Custom Clause');
  if(name && name.trim()){
    activeContract.clauses.push(name.trim());
    activeContract.clauseContent[name.trim()] = '';
    activeClauseIdx = activeContract.clauses.length-1;
    renderContractBuilder(activeContract.id);
  }
}

function _removeCtClause(i){
  if(!activeContract) return;
  activeContract.clauses.splice(i,1);
  if(activeClauseIdx >= activeContract.clauses.length) activeClauseIdx = Math.max(0, activeContract.clauses.length-1);
  renderContractBuilder(activeContract.id);
}

function _openClauseLibrary(){
  const lib = STD_CLAUSES || {};
  const items = Object.keys(lib);
  openModal(`
    <div class="modal-header"><span class="modal-title">Clause Library</span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;">
        ${items.map(name=>`
          <div style="border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <div>
              <div style="font-size:13px;font-weight:600;">${escHtml(name)}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${escHtml(lib[name].substring(0,80))}…</div>
            </div>
            <button class="btn btn-sm btn-primary" onclick="
              if(!activeContract.clauses.includes('${name}')){activeContract.clauses.push('${name}');activeContract.clauseContent['${name}']='${lib[name].replace(/'/g,'&#39;').replace(/\n/g,' ')}';activeClauseIdx=activeContract.clauses.length-1;}

          </div>`).join('')}
      </div>

}

                    <td><input type="number" value="${li.qty}" style="width:50px;" oninput="invLineItems[${i}].qty=+this.value;_refreshInvPreview()"></td>
                    <td><input type="number" value="${li.rate}" style="width:80px;" oninput="invLineItems[${i}].rate=+this.value;_refreshInvPreview()"></td>
                    <td><input type="number" value="${li.tax}" style="width:50px;" oninput="invLineItems[${i}].tax=+this.value;_refreshInvPreview()"></td>
                    <td style="font-weight:600;white-space:nowrap;">$${(li.qty*li.rate).toLocaleString()}</td>
                    <td><button onclick="invLineItems.splice(${i},1);renderInvoiceBuilder(activeInvoice.id)" style="background:none;border:none;cursor:pointer;color:var(--danger-text);"><i data-lucide="x" style="width:12px;height:12px;"></i></button></td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
            <button class="btn btn-sm btn-secondary mt-2" style="width:100%;" onclick="invLineItems.push({desc:'',qty:1,rate:0,tax:9});renderInvoiceBuilder(activeInvoice.id)">+ Add Line Item</button>
          </div>

          <div class="form-row">
            <div class="form-group"><label class="form-label">Discount ($)</label><input class="form-control" type="number" value="${inv.discount||0}" oninput="activeInvoice.discount=+this.value;_refreshInvPreview()"></div>
            <div class="form-group"><label class="form-label">Late Fee (%/month)</label><input class="form-control" type="number" value="${inv.lateFee||1.5}" step="0.1" oninput="activeInvoice.lateFee=+this.value"></div>
          </div>

          <div style="background:var(--bg);border-radius:var(--radius);padding:14px;font-size:13px;display:flex;flex-direction:column;gap:8px;" id="inv-totals">
            ${_buildInvTotalsHtml()}
          </div>

          <div class="form-group"><label class="form-label">Notes / Payment Instructions</label>
            <textarea class="form-control" rows="3" placeholder="Bank details, payment notes…" oninput="activeInvoice.notes=this.value;_refreshInvPreview()">${escHtml(inv.notes||'')}</textarea>
          </div>

          <div class="flex gap-2 flex-wrap">
            <button class="btn btn-secondary btn-sm" onclick="_saveInvoiceNow();markInvPaid(activeInvoice.id)"><i data-lucide="check-circle" style="width:13px;height:13px;"></i> Mark Paid</button>
            <button class="btn btn-secondary btn-sm" onclick="showToast('Payment reminder sent!','success')"><i data-lucide="bell" style="width:13px;height:13px;"></i> Reminder</button>
            <button class="btn btn-danger btn-sm" onclick="deleteInvoice(activeInvoice.id)" style="background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-text);"><i data-lucide="trash-2" style="width:13px;height:13px;"></i> Delete</button>
          </div>
        </div>
      </div>

      <div class="builder-preview">
        <div class="preview-doc" id="inv-preview">
          ${_buildInvoicePreviewHtml(inv)}
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
};

function _buildInvTotalsHtml(){
  const sub  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const disc = (activeInvoice&&activeInvoice.discount)||0;
  const tot  = sub+tax-disc;
  if(activeInvoice){ activeInvoice.amount=sub; activeInvoice.total=tot; }
  return `
    <div class="flex justify-between"><span style="color:var(--text-secondary);">Subtotal</span><span>${fmtCurrency(sub)}</span></div>
    <div class="flex justify-between"><span style="color:var(--text-secondary);">Tax</span><span>${fmtCurrency(tax)}</span></div>
    ${disc?`<div class="flex justify-between"><span style="color:var(--success-text);">Discount</span><span style="color:var(--success-text);">-${fmtCurrency(disc)}</span></div>`:''}
    <div class="flex justify-between fw-700" style="border-top:1px solid var(--border);padding-top:8px;font-size:15px;color:var(--primary);"><span>Total Due</span><span>${fmtCurrency(tot)}</span></div>`;
}

function _buildInvoicePreviewHtml(inv){
  if(!inv) return '';
  const cl  = getClient(inv.clientId);
  const sub  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax  = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const disc = inv.discount||0;
  const tot  = sub+tax-disc;
  const depositAmt = inv.type==='deposit' ? (tot*(inv.depositPct||50)/100) : null;

  return `
    <div style="padding:36px 40px;border-bottom:3px solid var(--primary);">
      <div class="flex justify-between items-start mb-4">
        <div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-.5px;">INVOICE</div>
          <div style="font-size:13px;color:var(--primary);font-weight:600;">${escHtml(inv.num)}</div>
          ${inv.type&&inv.type!=='one-time'?`<span style="font-size:10px;font-weight:700;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:99px;text-transform:uppercase;">${inv.type}</span>`:''}
        </div>
        <div style="text-align:right;">
          <div style="font-size:16px;font-weight:700;">${escHtml(db.user.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);">DealSuite Account</div>
        </div>
      </div>
      <div class="flex justify-between" style="margin-top:20px;flex-wrap:wrap;gap:16px;">
        <div>
          <div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Bill To</div>
          <div style="font-weight:600;font-size:14px;">${escHtml(cl.name||'Client Name')}</div>
          <div style="color:var(--text-secondary);font-size:13px;">${escHtml(cl.company||'')}</div>
          <div style="color:var(--text-secondary);font-size:13px;">${escHtml(cl.email||'')}</div>
        </div>
        <div style="text-align:right;">
          <div style="margin-bottom:6px;"><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Issue Date</span><br><span style="font-size:13px;font-weight:500;">${fmtDate(inv.issued)}</span></div>
          ${inv.due?`<div><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Due Date</span><br><span style="font-size:13px;font-weight:500;color:${inv.status==='overdue'?'var(--danger-text)':'inherit'};">${fmtDate(inv.due)}</span></div>`:''}
        </div>
      </div>
    </div>
    <div style="padding:28px 40px;">
      ${inv.project?`<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:16px;">Re: ${escHtml(inv.project)}</div>`:''}
      <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:20px;">
        <thead><tr style="background:var(--bg);">${['Description','Qty','Rate','Tax','Amount'].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;">${h}</th>`).join('')}</tr></thead>
        <tbody>${invLineItems.map(li=>`<tr style="border-bottom:1px solid var(--border-light);">
          <td style="padding:10px;">${escHtml(li.desc)||'—'}</td>
          <td style="padding:10px;">${li.qty}</td>
          <td style="padding:10px;">${fmtCurrency(li.rate)}</td>
          <td style="padding:10px;">${li.tax}%</td>
          <td style="padding:10px;font-weight:600;">${fmtCurrency(li.qty*li.rate)}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="float:right;width:240px;font-size:13px;">
        <div class="flex justify-between" style="padding:6px 0;"><span style="color:var(--text-secondary);">Subtotal</span><span>${fmtCurrency(sub)}</span></div>
        <div class="flex justify-between" style="padding:6px 0;"><span style="color:var(--text-secondary);">Tax</span><span>${fmtCurrency(tax)}</span></div>
        ${disc?`<div class="flex justify-between" style="padding:6px 0;color:var(--success-text);"><span>Discount</span><span>-${fmtCurrency(disc)}</span></div>`:''}
        <div class="flex justify-between" style="padding:10px 0;border-top:2px solid var(--primary);font-size:16px;font-weight:700;color:var(--primary);"><span>Total</span><span>${fmtCurrency(tot)}</span></div>
        ${depositAmt!=null?`<div style="margin-top:8px;padding:8px 10px;background:var(--warning-bg);border-radius:var(--radius-sm);text-align:center;font-size:13px;font-weight:600;color:var(--warning-text);">Deposit Due Now: ${fmtCurrency(depositAmt)}</div>`:''}
      </div>
      <div style="clear:both;padding-top:20px;margin-top:20px;border-top:1px solid var(--border);">
        <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Notes</div>
        <div style="font-size:13px;color:var(--text-secondary);">${escHtml(inv.notes||'Thank you for your business!')}</div>
        ${inv.lateFee?`<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Late payments subject to ${inv.lateFee}% monthly fee.</div>`:''}
      </div>
    </div>`;
}

function _refreshInvPreview(){
  const el = document.getElementById('inv-preview');
  if(el && activeInvoice) el.innerHTML = _buildInvoicePreviewHtml(activeInvoice);
  const totEl = document.getElementById('inv-totals');
  if(totEl) totEl.innerHTML = _buildInvTotalsHtml();
  saveToStorage();
}

function _setInvType(type, btn){
  if(activeInvoice) activeInvoice.type = type;
  document.querySelectorAll('#inv-type-btns button').forEach(b=>{
    b.style.borderColor='var(--border)'; b.style.background='var(--surface)'; b.style.color='var(--text-secondary)';
  });
  btn.style.borderColor='var(--primary)'; btn.style.background='var(--primary-light)'; btn.style.color='var(--primary)';
  const ro = document.getElementById('recurring-opts');
  const do_ = document.getElementById('deposit-opts');
  if(ro) ro.style.display = type==='recurring'?'block':'none';
  if(do_) do_.style.display = type==='deposit'?'block':'none';
  _refreshInvPreview();
}

function _saveInvoiceNow(){
  if(!activeInvoice) return;
  const sub = invLineItems.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax = invLineItems.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  activeInvoice.amount = sub;
  activeInvoice.total = sub+tax-(activeInvoice.discount||0);
  activeInvoice.lineItems = [...invLineItems];
  const idx = db.invoices.findIndex(x=>x.id===activeInvoice.id);
  if(idx>=0) db.invoices[idx] = activeInvoice;
  else db.invoices.push(activeInvoice);
  saveToStorage();
  showToast('Invoice saved!','success');
}

function _sendInvoiceModal(){
  if(!activeInvoice) return;
  const inv = activeInvoice;
  const cl = getClient(inv.clientId);
  openModal(`
    <div class="modal-header"><span class="modal-title">Send Invoice</span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group"><label class="form-label">To</label><input class="form-control" value="${escHtml(cl.email||'')}" placeholder="client@email.com"></div>
      <div class="form-group"><label class="form-label">Subject</label><input class="form-control" value="Invoice ${escHtml(inv.num)} from ${escHtml(db.user.name)}"></div>
      <div class="form-group"><label class="form-label">Message</label><textarea class="form-control" rows="4">Hi ${escHtml(cl.name?cl.name.split(' ')[0]:'there')},\n\nPlease find your invoice attached for ${escHtml(inv.project||'services rendered')}.\n\nTotal due: ${fmtCurrency(inv.total||0)}\n\nThank you for your business!</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="closeModal();activeInvoice.status='sent';_saveInvoiceNow();renderInvoicesList();showToast('Invoice sent!','success')"><i data-lucide="send" style="width:14px;height:14px;"></i> Send Invoice</button>
    </div>`);
  lucide.createIcons();
}

function _copyPaymentLink(){
  if(!activeInvoice){ showToast('Save invoice first','error'); return; }
  const inv = activeInvoice;
  const cl = getClient(inv.clientId);
  const link = window.location.origin + window.location.pathname + '#pay-' + inv.id;
  try{ navigator.clipboard.writeText(link); showToast('Payment link copied to clipboard!','success'); }
  catch(e){
    openModal(`
      <div class="modal-header"><span class="modal-title">Payment Link</span><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:13px;color:var(--text-secondary);">Share this link with <strong>${escHtml(cl.name||'your client')}</strong> to collect payment for <strong>${escHtml(inv.num)}</strong> (${fmtCurrency(inv.total||0)}).</div>
        <input class="form-control" value="${link}" onclick="this.select()" readonly style="font-size:12px;font-family:monospace;">
        <button class="btn btn-primary" onclick="navigator.clipboard.writeText('${link}');showToast('Copied!','success');closeModal()">Copy Link</button>
      </div>`);
  }
}

function _downloadInvoicePDF(invId){
  const inv = db.invoices.find(x=>x.id===invId)||activeInvoice;
  if(!inv){ showToast('Invoice not found','error'); return; }
  const cl = getClient(inv.clientId);
  const items = inv.lineItems && inv.lineItems.length ? inv.lineItems : invLineItems;
  const sub  = items.reduce((s,i)=>s+(i.qty*i.rate),0);
  const tax  = items.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  const disc = inv.discount||0;
  const tot  = sub+tax-disc;
  const depositAmt = inv.type==='deposit' ? (tot*(inv.depositPct||50)/100) : null;
  const accentColor = '#5347CE';

  const lineRows = items.map(li=>`
    <tr>
      <td>${escHtml(li.desc)||'—'}</td>
      <td style="text-align:center;">${li.qty}</td>
      <td style="text-align:right;">${fmtCurrency(li.rate)}</td>
      <td style="text-align:center;">${li.tax}%</td>
      <td style="text-align:right;font-weight:600;">${fmtCurrency(li.qty*li.rate)}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${escHtml(inv.num)} — ${escHtml(inv.project||'Invoice')}</title>
    <style>
      @page { size:A4; margin:20mm 18mm 22mm 18mm; }
      *{box-sizing:border-box;margin:0;padding:0;}
      html,body{font-family:'Helvetica Neue',Arial,sans-serif;color:#111827;font-size:13px;line-height:1.6;background:#fff;}
      .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:3px solid ${accentColor};}
      .inv-label{font-size:28px;font-weight:800;letter-spacing:-1px;color:#111827;}
      .inv-num{font-size:13px;color:${accentColor};font-weight:600;margin-top:4px;}
      .inv-type-badge{display:inline-block;font-size:9px;font-weight:700;background:${accentColor}22;color:${accentColor};padding:2px 8px;border-radius:99px;text-transform:uppercase;margin-top:6px;}
      .sender{text-align:right;}
      .sender-name{font-size:16px;font-weight:700;}
      .sender-sub{font-size:12px;color:#6B7280;margin-top:2px;}
      .meta-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
      .bill-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9CA3AF;margin-bottom:5px;}
      .bill-name{font-size:14px;font-weight:700;}
      .bill-sub{font-size:12px;color:#6B7280;margin-top:2px;}
      .dates{text-align:right;}
      .date-item{margin-bottom:8px;}
      .date-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9CA3AF;display:block;margin-bottom:2px;}
      .date-val{font-size:13px;font-weight:600;}
      .project-ref{font-size:13px;font-weight:600;color:#6B7280;margin-bottom:14px;}
      table{width:100%;border-collapse:collapse;margin-bottom:20px;}
      thead tr{background:#F9FAFB;}
      th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:#6B7280;border-bottom:2px solid #E5E7EB;text-transform:uppercase;letter-spacing:.05em;}
      td{padding:10px;border-bottom:1px solid #F3F4F6;font-size:13px;}
      tr:last-child td{border-bottom:none;}
      .totals-wrap{display:flex;justify-content:flex-end;margin-top:4px;}
      .totals{width:240px;}
      .tot-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#6B7280;}
      .tot-final{display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid ${accentColor};font-size:16px;font-weight:800;color:${accentColor};}
      .deposit-box{margin-top:10px;padding:10px 14px;background:#FEF3C7;border-radius:6px;text-align:center;font-size:13px;font-weight:600;color:#92400E;}
      .notes{margin-top:28px;padding-top:18px;border-top:1px solid #E5E7EB;}
      .notes-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9CA3AF;margin-bottom:6px;}
      .notes-text{font-size:13px;color:#6B7280;line-height:1.7;}
      .late-fee{font-size:11px;color:#9CA3AF;margin-top:6px;}
      @media print{html,body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
    </style></head><body>
    <div class="header">
      <div>
        <div class="inv-label">INVOICE</div>
        <div class="inv-num">${escHtml(inv.num)}</div>
        ${inv.type&&inv.type!=='one-time'?`<div class="inv-type-badge">${inv.type}</div>`:''}
      </div>
      <div class="sender">
        <div class="sender-name">${escHtml(db.user.name)}</div>
        <div class="sender-sub">${escHtml(db.user.company||'DealSuite Account')}</div>
        ${db.user.email?`<div class="sender-sub">${escHtml(db.user.email)}</div>`:''}
      </div>
    </div>
    <div class="meta-row">
      <div>
        <div class="bill-label">Bill To</div>
        <div class="bill-name">${escHtml(cl.name||'—')}</div>
        ${cl.company?`<div class="bill-sub">${escHtml(cl.company)}</div>`:''}
        ${cl.email?`<div class="bill-sub">${escHtml(cl.email)}</div>`:''}
      </div>
      <div class="dates">
        <div class="date-item"><span class="date-label">Issue Date</span><span class="date-val">${fmtDate(inv.issued)}</span></div>

      </div>

    ${inv.project?`<div class="project-ref">Re: ${escHtml(inv.project)}</div>`:''}
    <table>
      <thead><tr>
        <th>Description</th><th style="text-align:center;">Qty</th>
        <th style="text-align:right;">Rate</th><th style="text-align:center;">Tax</th>
        <th style="text-align:right;">Amount</th>
      </tr></thead>
      <tbody>${lineRows}</tbody>
    </table>
    <div class="totals-wrap"><div class="totals">
      <div class="tot-row"><span>Subtotal</span><span>${fmtCurrency(sub)}</span></div>
      <div class="tot-row"><span>Tax</span><span>${fmtCurrency(tax)}</span></div>
      ${disc?`<div class="tot-row" style="color:#059669;"><span>Discount</span><span>-${fmtCurrency(disc)}</span></div>`:''}
      <div class="tot-final"><span>Total Due</span><span>${fmtCurrency(tot)}</span></div>
      ${depositAmt!=null?`<div class="deposit-box">Deposit Due Now: ${fmtCurrency(depositAmt)}</div>`:''}
    </div></div>
    ${inv.notes||inv.lateFee?`<div class="notes">
      <div class="notes-label">Notes</div>
      <div class="notes-text">${escHtml(inv.notes||'Thank you for your business!')}</div>
      ${inv.lateFee?`<div class="late-fee">Late payments subject to ${inv.lateFee}% monthly fee.</div>`:''}
    </div>`:''}
    <script>window.onload=function(){window.print();window.onafterprint=function(){window.close();};};<\/script>
  </body></html>`;

  const win = window.open('','_blank','width=900,height=700');
  if(win){ win.document.write(html); win.document.close(); }
  else showToast('Allow popups to download PDF','error');
}

window._setInvType = _setInvType;
window._saveInvoiceNow = _saveInvoiceNow;
window._sendInvoiceModal = _sendInvoiceModal;
window._copyPaymentLink = _copyPaymentLink;
window._downloadInvoicePDF = _downloadInvoicePDF;

        </div>
        <div class="form-group"><label class="form-label">Invoice (optional)</label>
          <select class="form-control" id="exp-inv">
            <option value="">No invoice</option>
            ${db.invoices.map(i=>`<option value="${i.id}" ${(exp&&exp.invoiceId===i.id)?'selected':''}>${escHtml(i.num)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-control" id="exp-notes" rows="2" placeholder="Optional notes…">${escHtml(exp?exp.notes||'':'')}</textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="exp-billable" ${(!exp||exp.billable)?'checked':''} style="accent-color:var(--primary);width:14px;height:14px;">
          Billable to client
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="_saveExpense('${editId||''}')"><i data-lucide="check" style="width:14px;height:14px;"></i> ${exp?'Update':'Add'} Expense</button>
    </div>`);
  lucide.createIcons();
};

window._saveExpense = function(editId){
  const desc = document.getElementById('exp-desc')?.value?.trim();
  const amount = parseFloat(document.getElementById('exp-amount')?.value);
  if(!desc){ showToast('Enter a description','error'); return; }
  if(!amount || amount<=0){ showToast('Enter a valid amount','error'); return; }
  const expData = {
    desc, amount,
    category: document.getElementById('exp-cat')?.value||'Other',
    date: document.getElementById('exp-date')?.value||new Date().toISOString().split('T')[0],
    clientId: document.getElementById('exp-client')?.value||'',
    invoiceId: document.getElementById('exp-inv')?.value||'',
    notes: document.getElementById('exp-notes')?.value||'',
    billable: document.getElementById('exp-billable')?.checked||false,
  };
  if(editId){
    const idx = db.expenses.findIndex(e=>e.id===editId);
    if(idx>=0) db.expenses[idx] = {...db.expenses[idx], ...expData};
  } else {
    db.expenses.push({id:'exp_'+Date.now(), ...expData});
  }
  saveToStorage();
  closeModal();
  renderExpenses();
  showToast(editId?'Expense updated!':'Expense added!','success');
};

window._deleteExpense = function(id){
  openConfirm('Delete Expense','Delete this expense? This cannot be undone.',()=>{
    db.expenses = db.expenses.filter(e=>e.id!==id);
    saveToStorage();
    renderExpenses();
    showToast('Expense deleted','success');
  });
};

// Override renderExpenses to wire Add button
const _prevRenderExpenses = window.renderExpenses;
window.renderExpenses = function(){
  _prevRenderExpenses();
  setTimeout(()=>{
    // Wire "Add Expense" button
    const addBtn = document.querySelector('#page-expenses .btn-primary[onclick*="openAddExpenseModal"], #page-expenses .btn-primary');
    if(addBtn && addBtn.textContent.includes('Add')) addBtn.onclick = ()=>openAddExpense();
    // Wire edit/delete buttons
    document.querySelectorAll('#page-expenses [data-exp-id]').forEach(el=>{
      const id = el.dataset.expId;
      const action = el.dataset.action;
      if(action==='edit') el.onclick = ()=>openAddExpense(id);
      if(action==='delete') el.onclick = ()=>_deleteExpense(id);
    });
  }, 0);
};

// Patch renderExpenses to use new openAddExpense
window.__patchedExpenseAdd = true;
</script>
</body>
</html>
